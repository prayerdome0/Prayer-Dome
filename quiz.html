<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prayer Dome | Ultimate Bible Quiz</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --accent-green: #15803d;
            --accent-green-light: #22c55e;
            --accent-gold: #d4af37;
            --accent-gold-dark: #b45309;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --shadow-glow: 0 10px 30px rgba(21, 128, 61, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body.dark-mode {
            --bg-primary: #020617; --bg-card: #0f172a; --text-main: #f8fafc; --text-sub: #94a3b8; 
            --border-color: #1e293b;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 10px 30px rgba(21, 128, 61, 0.1);
            --glass-bg: rgba(15, 23, 42, 0.7);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-main); line-height: 1.6; transition: 0.4s; padding-bottom: 40px; overflow-x: hidden;}

        /* Luxury Font */
        .luxury-font, h1, h2, .level-box, .score-box { font-family: 'Playfair Display', serif; }

        /* Header with Logo */
        header {
            background: var(--bg-card);
            padding: 12px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.9);
        }
        body.dark-mode header { background: rgba(15,23,42,0.95); }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
        }
        .logo-ring { 
            width: 45px; 
            height: 45px; 
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold)); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(21,128,61,0.3);
        }
        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
            background: white;
            padding: 5px;
        }
        .brand-text h1 { 
            font-size: 1.2rem; 
            font-weight: 900; 
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }
        .brand-text p { 
            font-size: 0.6rem; 
            opacity: 0.7; 
            letter-spacing: 1px;
        }

        .theme-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 14px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-main);
        }
        .theme-btn:hover { transform: scale(1.05); background: rgba(34,197,94,0.1); }

        .main-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; position: relative; z-index: 5;}

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 30px;
        }
        .dark-mode .glass-card { border: 1px solid rgba(255,255,255,0.05); }

        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .score-display { display: flex; gap: 15px; flex-wrap: wrap; align-items: center;}
        .score-box { background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light)); padding: 10px 25px; border-radius: 40px; color: white; font-weight: 800; font-size: 1.1rem; box-shadow: var(--shadow-glow); display: flex; align-items: center; gap: 8px;}
        .level-box { background: rgba(212, 175, 55, 0.1); padding: 10px 25px; border-radius: 40px; font-weight: 800; color: var(--accent-gold); border: 2px solid var(--accent-gold); display: flex; align-items: center; gap: 8px;}
        .streak-counter { font-weight: 800; color: var(--text-sub); display: flex; align-items: center; gap: 8px; font-size: 1.1rem; transition: 0.3s; }
        .streak-counter.on-fire { color: #f97316; text-shadow: 0 0 10px rgba(249, 115, 22, 0.4); animation: fireShake 0.5s infinite alternate; }

        @keyframes fireShake { 0% { transform: rotate(-2deg) scale(1.1); } 100% { transform: rotate(2deg) scale(1.1); } }

        /* Level Grid Map */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 15px;
        }
        .level-badge {
            aspect-ratio: 1;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            color: var(--text-sub);
            position: relative;
        }
        .level-badge:hover:not(.locked) { transform: translateY(-8px) scale(1.1); box-shadow: var(--shadow); border-color: var(--accent-green); }
        .level-badge.completed { background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light)); border-color: var(--accent-green); color: white; animation: completedPulse 0.5s ease; }
        @keyframes completedPulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .level-badge.locked { opacity: 0.4; cursor: not-allowed; background: var(--bg-card); position: relative; }
        .level-badge.locked::after { content: '\f023'; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; font-size: 0.8rem; top: 8px; right: 8px; opacity: 0.5; }
        .level-badge.current { border: 3px solid var(--accent-gold); transform: scale(1.05); background: rgba(212, 175, 55, 0.15); color: var(--accent-gold); animation: pulseBorder 2s infinite; }
        .level-badge.current::before { content: '▶'; position: absolute; top: -8px; left: -8px; font-size: 12px; color: var(--accent-gold); }

        @keyframes pulseBorder { 0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(212, 175, 55, 0); } }

        /* Active Quiz UI */
        .quiz-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        
        .timer-container { width: 100%; height: 12px; background: var(--bg-primary); border-radius: 10px; margin-bottom: 30px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .timer-fill { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-green-light)); width: 100%; border-radius: 10px; transition: width 1s linear, background-color 0.3s; }
        .timer-fill.warning { background: linear-gradient(90deg, var(--accent-gold), #fcd34d); }
        .timer-fill.danger { background: linear-gradient(90deg, var(--accent-red), #fca5a5); animation: pulseDanger 0.5s infinite alternate; }

        @keyframes pulseDanger { from { opacity: 1; } to { opacity: 0.6; } }

        .question-text { font-family: 'Fredoka One', 'Inter', sans-serif; font-size: 1.6rem; line-height: 1.4; margin-bottom: 35px; color: var(--text-main); text-align: center; animation: questionFadeIn 0.5s ease; }
        @keyframes questionFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .option-btn {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            animation: optionSlideIn 0.4s ease backwards;
        }
        .option-btn:nth-child(1) { animation-delay: 0.05s; }
        .option-btn:nth-child(2) { animation-delay: 0.1s; }
        .option-btn:nth-child(3) { animation-delay: 0.15s; }
        .option-btn:nth-child(4) { animation-delay: 0.2s; }
        
        @keyframes optionSlideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
            background: rgba(59, 130, 246, 0.05);
        }

        .option-letter {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--text-sub);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
            transition: 0.2s;
        }

        .option-btn.correct {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            border-color: var(--accent-green);
            color: white;
            animation: correctPop 0.5s ease;
        }
        .option-btn.correct .option-letter { background: white; color: var(--accent-green); border-color: white; }

        .option-btn.wrong {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            border-color: var(--accent-red);
            color: white;
            animation: wrongShake 0.4s ease;
        }
        .option-btn.wrong .option-letter { background: white; color: var(--accent-red); border-color: white; }
        .option-btn.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); }

        @keyframes correctPop { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); box-shadow: var(--shadow-glow); } 
            100% { transform: scale(1); } 
        }
        @keyframes wrongShake { 
            0%, 100% { transform: translateX(0); } 
            20%, 60% { transform: translateX(-8px); } 
            40%, 80% { transform: translateX(8px); } 
        }

        /* Power-ups */
        .powerups-container { display: flex; justify-content: center; gap: 15px; }
        .powerup-btn {
            background: var(--bg-card);
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .powerup-btn:hover:not(:disabled) {
            background: var(--accent-blue);
            color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        .powerup-btn:disabled {
            border-color: var(--border-color);
            color: var(--text-sub);
            cursor: not-allowed;
            opacity: 0.5;
        }
        .powerup-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            font-weight: 800;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Buttons */
        .btn-modern {
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        .btn-modern:hover:not(:disabled) { transform: translateY(-3px); box-shadow: var(--shadow-glow); }
        .btn-modern:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Leaderboard */
        .leaderboard-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow);
        }
        .lb-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: 0.2s;
            animation: slideInLeft 0.3s ease backwards;
        }
        .lb-item:nth-child(1) { animation-delay: 0.05s; }
        .lb-item:nth-child(2) { animation-delay: 0.1s; }
        .lb-item:nth-child(3) { animation-delay: 0.15s; }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .lb-item:hover { background: rgba(212, 175, 55, 0.08); border-radius: 20px; transform: translateX(5px); }
        .lb-rank { font-weight: 800; font-size: 1.2rem; width: 45px; color: var(--text-sub); }
        .lb-item:nth-child(1) .lb-rank { color: #fbbf24; font-size: 1.5rem; } 
        .lb-item:nth-child(2) .lb-rank { color: #9ca3af; font-size: 1.4rem; } 
        .lb-item:nth-child(3) .lb-rank { color: #cd7f32; font-size: 1.3rem; } 
        .lb-score {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 45px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        @keyframes modalPop {
            from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .trophy-container { position: relative; display: inline-block; margin-bottom: 20px; }
        .trophy-icon { font-size: 100px; color: var(--accent-gold); animation: floatTrophy 3s ease-in-out infinite; text-shadow: 0 10px 20px rgba(212, 175, 55, 0.4); }
        .trophy-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 150px; background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%); z-index: -1; animation: pulseGlow 2s infinite; }

        @keyframes floatTrophy { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulseGlow { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; } }

        /* Toast */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; }
        .toast {
            background: var(--bg-card);
            padding: 14px 24px;
            border-radius: 50px;
            margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-left: 5px solid var(--accent-green);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            animation: slideIn 0.4s ease;
            color: var(--text-main);
        }
        .toast.error { border-left-color: var(--accent-red); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        footer { padding: 40px 20px; text-align: center; background: transparent; margin-top: 40px; }
        .footer-logo { font-size: 1.3rem; font-weight: 900; color: var(--accent-green); margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .copyright { font-size: 11px; color: var(--text-sub); font-weight: 500; letter-spacing: 0.5px; }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .question-text { font-size: 1.2rem; }
            .stats-bar { flex-direction: column; align-items: stretch; text-align: center; }
            .score-display { justify-content: center; }
            .level-badge { font-size: 1rem; }
            .level-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
            .option-btn { padding: 15px; font-size: 0.9rem; }
            .option-letter { width: 32px; height: 32px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <audio id="soundLevelUp" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
    <audio id="soundTick" src="https://assets.mixkit.co/active_storage/sfx/2044/2044-preview.mp3" preload="auto"></audio>
    <audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    <audio id="soundWrong" src="https://assets.mixkit.co/active_storage/sfx/2001/2001-preview.mp3" preload="auto"></audio>

    <header>
        <div class="logo-area" onclick="window.location.href='index.html'">
            <div class="logo-ring">
                <img src="https://i.ibb.co/TB5Fx4tb/logo-0.png" alt="Prayer Dome Logo">
            </div>
            <div class="brand-text">
                <h1>PRAYER DOME</h1>
                <p>BIBLE QUIZ</p>
            </div>
        </div>
        <button class="theme-btn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
    </header>

    <div class="toast-container" id="toastContainer"></div>

    <div class="main-container">
        
        <!-- Stats Bar -->
        <div class="stats-bar glass-card">
            <div class="score-display">
                <div class="score-box"><i class="fas fa-star"></i> <span id="totalScore">0</span> Pts</div>
                <div class="level-box"><i class="fas fa-map-marker-alt"></i> Level <span id="currentLevelDisplay">1</span>/30</div>
                <div class="streak-counter" id="streakCounter"><i class="fas fa-fire"></i> Streak: 0</div>
            </div>
            <button class="btn-modern" style="padding: 10px 20px; font-size: 0.85rem; background: var(--bg-primary); color: var(--text-main); border: 1px solid var(--border-color); box-shadow: none;" onclick="resetProgress()">
                <i class="fas fa-redo-alt"></i> Reset
            </button>
        </div>

        <!-- Level Map Grid -->
        <div id="levelMap" style="display: block;">
            <h2 style="margin-bottom: 20px; color: var(--accent-green); font-weight: 800; font-family: 'Playfair Display', serif;"><i class="fas fa-map-signs"></i> Journey Map</h2>
            <div class="level-grid" id="levelGrid"></div>
        </div>

        <!-- Active Quiz Area -->
        <div class="glass-card" id="quizActiveScreen" style="display: none;">
            <div class="quiz-top-bar">
                <div style="font-weight: 800; color: var(--accent-gold); font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-question-circle"></i> Question <span id="qCurrent">1</span>/<span id="qTotal">10</span>
                </div>
                <div class="powerups-container">
                    <button class="powerup-btn" id="btnFifty" onclick="useFiftyFifty()" title="50/50 Lifeline">
                        <i class="fas fa-magic"></i>
                        <span class="powerup-count" id="countFifty">3</span>
                    </button>
                    <button class="powerup-btn" id="btnFreeze" onclick="useFreezeTime()" title="Freeze Time" style="color: var(--accent-purple); border-color: var(--accent-purple);">
                        <i class="fas fa-snowflake"></i>
                        <span class="powerup-count" id="countFreeze" style="background: var(--accent-purple);">3</span>
                    </button>
                </div>
            </div>

            <div class="timer-container">
                <div class="timer-fill" id="timerFill"></div>
            </div>

            <div class="question-text" id="questionText">Loading Question...</div>
            <div class="options-grid" id="optionsGrid"></div>

            <div style="text-align: right; margin-top: 30px;">
                <button class="btn-modern" id="nextBtn" onclick="nextQuestion()" disabled style="width: 100%; max-width: 300px;">
                    Next Question <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Leaderboard -->
        <div class="leaderboard-card" id="leaderboardSection">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="color: var(--accent-gold); font-weight: 800; font-family: 'Playfair Display', serif;"><i class="fas fa-globe"></i> Global Top 10</h2>
                <button class="btn-modern" style="padding: 8px 16px; font-size: 0.8rem; background: var(--bg-primary); color: var(--text-main); border: 1px solid var(--border-color); box-shadow: none;" onclick="loadLeaderboard()"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div id="leaderboardList">
                <div style="text-align: center; padding: 30px;"><i class="fas fa-spinner fa-spin" style="font-size: 30px; color: var(--accent-green);"></i></div>
            </div>
        </div>
    </div>

    <!-- Level Complete Modal -->
    <div class="modal" id="levelCompleteModal">
        <div class="modal-content">
            <div class="trophy-container">
                <div class="trophy-glow"></div>

            ["What did God use to speak to Job?", "Whirlwind", "Fire", "Thunder", "Dream", 0],
            ["Who was the father of John the Baptist?", "Zechariah", "Joseph", "Eli", "Simon", 0],
            ["What sea did Jesus walk on?", "Sea of Galilee", "Dead Sea", "Red Sea", "Mediterranean", 0],
            ["Who wrote most of the New Testament letters?", "Paul", "Peter", "John", "James", 0],
            ["What was the name of the garden where Jesus prayed?", "Gethsemane", "Eden", "Golgotha", "Bethesda", 0]
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function randomizeOptions(question) {
            let opts = [
                { text: question[1], isCorrect: question[5] === 0 },
                { text: question[2], isCorrect: question[5] === 1 },
                { text: question[3], isCorrect: question[5] === 2 },
                { text: question[4], isCorrect: question[5] === 3 }
            ];
            opts = shuffleArray(opts);
            return {
                text: question[0],
                options: opts.map(o => o.text),
                correct: opts.findIndex(o => o.isCorrect)
            };
        }

        // Create 30 levels with 10 unique questions each (no repeats across levels)
        const allQuestions = shuffleArray([...rawQuestions]);
        const levelQuestions = {};
        const TOTAL_LEVELS = 30;
        const QUESTIONS_PER_LEVEL = 10;
        
        for (let lvl = 1; lvl <= TOTAL_LEVELS; lvl++) {
            const startIdx = (lvl - 1) * QUESTIONS_PER_LEVEL;
            const levelQ = allQuestions.slice(startIdx, startIdx + QUESTIONS_PER_LEVEL);
            levelQuestions[lvl] = levelQ.map(q => randomizeOptions(q));
        }

        // Game State
        let userProgress = { completedLevels: [], currentLevel: 1, totalScore: 0 };
        let activeLevel = 1;
        let qIndex = 0;
        let scoreInLevel = 0;
        let streak = 0;
        let timerInt;
        let timeLeft = 15;
        let isLocked = false;
        let timeFrozen = false;
        let powerups = { fifty: 3, freeze: 3 };

        const sfxWin = document.getElementById('soundLevelUp');
        const sfxTick = document.getElementById('soundTick');
        const sfxCorrect = document.getElementById('soundCorrect');
        const sfxWrong = document.getElementById('soundWrong');

        // Firebase Sync
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                try {
                    const docSnap = await getDoc(doc(db, "userQuiz", user.uid));
                    if (docSnap.exists()) {
                        userProgress = docSnap.data();
                    } else {
                        userProgress.userId = user.uid;
                        await setDoc(doc(db, "userQuiz", user.uid), userProgress, { merge: true });
                    }
                } catch(e) { console.error("Firebase load error", e); }
            } else {
                const local = localStorage.getItem('prayerdome_quiz');
                if (local) userProgress = JSON.parse(local);
            }
            initUI();
            loadLeaderboard();
        });

        async function saveProgress() {
            localStorage.setItem('prayerdome_quiz', JSON.stringify(userProgress));
            if (currentUser) {
                try {
                    await setDoc(doc(db, "userQuiz", currentUser.uid), {
                        ...userProgress,
                        lastPlayed: serverTimestamp()
                    }, { merge: true });
                } catch(e) {}
            }
            initUI();
        }

        function initUI() {
            document.getElementById('totalScore').innerText = userProgress.totalScore;
            document.getElementById('currentLevelDisplay').innerText = userProgress.currentLevel;
            renderMap();
        }

        function renderMap() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= TOTAL_LEVELS; i++) {
                const isCompleted = userProgress.completedLevels.includes(i);
                const isUnlocked = i <= userProgress.currentLevel;
                const isCurrent = i === userProgress.currentLevel;
                const div = document.createElement('div');
                div.className = `level-badge ${isCompleted ? 'completed' : ''} ${!isUnlocked ? 'locked' : ''} ${isCurrent ? 'current' : ''}`;
                div.innerHTML = isCompleted ? '<i class="fas fa-check" style="font-size: 16px;"></i>' : i;
                if (isUnlocked) div.onclick = () => startLevel(i);
                grid.appendChild(div);
            }
        }

        window.startLevel = function(lvl) {
            activeLevel = lvl;
            qIndex = 0;
            scoreInLevel = 0;
            streak = 0;
            updateStreakUI();
            powerups = { fifty: 3, freeze: 3 };
            document.getElementById('countFifty').innerText = powerups.fifty;
            document.getElementById('countFreeze').innerText = powerups.freeze;
            document.getElementById('btnFifty').disabled = false;
            document.getElementById('btnFreeze').disabled = false;
            document.getElementById('levelMap').style.display = 'none';
            document.getElementById('quizActiveScreen').style.display = 'block';
            loadQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function loadQuestion() {
            if (qIndex >= QUESTIONS_PER_LEVEL) return endLevel();
            isLocked = false;
            timeFrozen = false;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('qCurrent').innerText = qIndex + 1;
            document.getElementById('qTotal').innerText = QUESTIONS_PER_LEVEL;
            
            const qData = levelQuestions[activeLevel][qIndex];
            document.getElementById('questionText').innerText = qData.text;
            document.getElementById('questionText').style.animation = 'none';
            setTimeout(() => document.getElementById('questionText').style.animation = 'questionFadeIn 0.5s ease', 10);
            
            const optsGrid = document.getElementById('optionsGrid');
            optsGrid.innerHTML = '';
            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.id = `opt-${idx}`;
                btn.innerHTML = `<div class="option-letter">${String.fromCharCode(65+idx)}</div> <span>${opt}</span>`;
                btn.onclick = () => checkAnswer(idx);
                optsGrid.appendChild(btn);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInt);
            timeLeft = 15;
            updateTimerUI();
            timerInt = setInterval(() => {
                if (timeFrozen || isLocked) return;
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 3 && timeLeft > 0) {
                    try { sfxTick.currentTime = 0; sfxTick.play().catch(()=>{}); } catch(e){}
                }
                if (timeLeft <= 0) {
                    clearInterval(timerInt);
                    handleTimeOut();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const fill = document.getElementById('timerFill');
            const pct = (timeLeft / 15) * 100;
            fill.style.width = `${pct}%`;
            fill.className = 'timer-fill';
            if (timeLeft <= 5) fill.classList.add('warning');
            if (timeLeft <= 3) fill.classList.add('danger');
        }
        
        window.checkAnswer = function(selectedIdx) {
            if (isLocked) return;
            isLocked = true;
            clearInterval(timerInt);
            const qData = levelQuestions[activeLevel][qIndex];
            const isCorrect = selectedIdx === qData.correct;
            const selectedBtn = document.getElementById(`opt-${selectedIdx}`);
            const correctBtn = document.getElementById(`opt-${qData.correct}`);
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            if (isCorrect) {
                selectedBtn.classList.add('correct');
                speakWord("Correct!");
                try { sfxCorrect.currentTime = 0; sfxCorrect.play().catch(()=>{}); } catch(e){}
                streak++;
                const speedBonus = Math.floor(timeLeft / 3);
                const streakMulti = streak >= 3 ? 2 : 1;
                const ptsEarned = (5 + speedBonus) * streakMulti;
                scoreInLevel += ptsEarned;
                showPointsAnim(ptsEarned);
                if (typeof confetti !== 'undefined') confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
            } else {
                selectedBtn.classList.add('wrong');
                if (correctBtn) correctBtn.classList.add('correct');
                speakWord("Wrong!");
                try { sfxWrong.currentTime = 0; sfxWrong.play().catch(()=>{}); } catch(e){}
                streak = 0;
            }
            updateStreakUI();
            document.getElementById('nextBtn').disabled = false;
        };

        function handleTimeOut() {
            isLocked = true;
            speakWord("Time is up! Wrong!");
            streak = 0;
            updateStreakUI();
            const qData = levelQuestions[activeLevel][qIndex];
            const correctBtn = document.getElementById(`opt-${qData.correct}`);
            if (correctBtn) correctBtn.classList.add('correct');
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            document.getElementById('nextBtn').disabled = false;
        }

        window.nextQuestion = function() {
            qIndex++;
            loadQuestion();
        };

        function endLevel() {
            const passScore = (QUESTIONS_PER_LEVEL * 5) * 0.5;
            const passed = scoreInLevel >= passScore;
            const modal = document.getElementById('levelCompleteModal');
            const mTitle = document.getElementById('modalTitle');
            const mSub = document.getElementById('modalSubtitle');
            const mIcon = document.getElementById('modalIcon');
            const mScore = document.getElementById('modalScore');
            const actionBtn = document.getElementById('modalActionBtn');
            mScore.innerText = scoreInLevel;
            
            if (passed) {
                mTitle.innerText = "LEVEL CLEARED! 🎉";
                mTitle.style.color = "var(--accent-green)";
                mIcon.className = "fas fa-trophy trophy-icon";
                mIcon.style.color = "var(--accent-gold)";
                mSub.innerText = "Awesome job! You unlocked the next level.";
                actionBtn.style.display = "inline-flex";
                try { sfxWin.currentTime = 0; sfxWin.play().catch(()=>{}); } catch(e){}
                confetti({ particleCount: 200, spread: 120 });
                userProgress.totalScore += scoreInLevel;
                if (!userProgress.completedLevels.includes(activeLevel)) {
                    userProgress.completedLevels.push(activeLevel);
                }
                if (activeLevel === userProgress.currentLevel && activeLevel < TOTAL_LEVELS) {
                    userProgress.currentLevel++;
                }
                saveProgress();
            } else {
                mTitle.innerText = "LEVEL FAILED 😢";
                mTitle.style.color = "var(--accent-red)";
                mIcon.className = "fas fa-heart-broken trophy-icon";
                mIcon.style.color = "var(--accent-red)";
                mSub.innerText = `You need ${Math.ceil(passScore)} points to pass. Try again!`;
                actionBtn.style.display = "none";
                speakWord("Level Failed. Try Again!");
            }
            modal.style.display = 'flex';
        }

        window.continueToMap = function() {
            document.getElementById('levelCompleteModal').style.display = 'none';
            document.getElementById('quizActiveScreen').style.display = 'none';
            document.getElementById('levelMap').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.retryLevel = function() {
            document.getElementById('levelCompleteModal').style.display = 'none';
            startLevel(activeLevel);
        };

        window.useFiftyFifty = function() {
            if (isLocked || powerups.fifty <= 0) return;
            powerups.fifty--;
            document.getElementById('countFifty').innerText = powerups.fifty;
            if (powerups.fifty === 0) document.getElementById('btnFifty').disabled = true;
            const qData = levelQuestions[activeLevel][qIndex];
            let hiddenCount = 0;
            let indices = [0, 1, 2, 3];
            indices = shuffleArray(indices);
            for (let i of indices) {
                if (i !== qData.correct && hiddenCount < 2) {
                    document.getElementById(`opt-${i}`).classList.add('hidden');
                    hiddenCount++;
                }
            }
            showToast('✨ 50/50 Applied! Two wrong options removed.', 'success');
        };

        window.useFreezeTime = function() {
            if (isLocked || powerups.freeze <= 0 || timeFrozen) return;
            powerups.freeze--;
            document.getElementById('countFreeze').innerText = powerups.freeze;
            if (powerups.freeze === 0) document.getElementById('btnFreeze').disabled = true;
            timeFrozen = true;
            document.getElementById('timerFill').style.background = 'var(--accent-purple)';
            showToast('❄️ Timer Frozen for 5 seconds!', 'success');
            setTimeout(() => {
                timeFrozen = false;
                document.getElementById('timerFill').style.background = '';
            }, 5000);
        };

        function updateStreakUI() {
            const el = document.getElementById('streakCounter');
            el.innerHTML = `<i class="fas fa-fire"></i> Streak: ${streak}`;
            if (streak >= 3) el.classList.add('on-fire');
            else el.classList.remove('on-fire');
        }

        function showPointsAnim(pts) {
            const floater = document.createElement('div');
            floater.innerText = `+${pts}`;
            floater.style.cssText = `position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); font-size:42px; font-weight:900; color:var(--accent-green); text-shadow:0 5px 15px rgba(0,0,0,0.2); z-index:9999; animation:floatUp 1s forwards; pointer-events:none;`;
            document.body.appendChild(floater);
            setTimeout(() => floater.remove(), 1000);
        }

        const floatStyle = document.createElement('style');
        floatStyle.innerHTML = `@keyframes floatUp { 0% { opacity:1; transform:translate(-50%, -50%) scale(1); } 100% { opacity:0; transform:translate(-50%, -150%) scale(1.5); } }`;
        document.head.appendChild(floatStyle);

        async function loadLeaderboard() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '<div style="text-align: center; padding: 30px;"><i class="fas fa-spinner fa-spin" style="font-size: 30px; color: var(--accent-green);"></i></div>';
            try {
                const q = query(collection(db, "userQuiz"), orderBy("totalScore", "desc"), limit(10));
                const snap = await getDocs(q);
                if (snap.empty) {
                    list.innerHTML = '<p style="text-align:center; padding:30px; color:var(--text-sub);">No scores yet. Be the first!</p>';
                    return;
                }
                let html = '';
                let rank = 1;
                for (let docSnap of snap.docs) {
                    const data = docSnap.data();
                    let name = 'Anonymous Player';
                    try {
                        const mDoc = await getDoc(doc(db, "memberships", data.userId));
                        if (mDoc.exists()) name = mDoc.data().fullName || 'Member';
                        else if (data.userId) name = data.userId.substring(0, 8);
                    } catch(e) {}
                    html += `
                        <div class="lb-item">
                            <div style="display:flex; align-items:center; gap: 15px;">
                                <span class="lb-rank">#${rank}</span>
                                <span style="font-weight: 600; color:var(--text-main);"><i class="fas fa-user-circle"></i> ${escapeHtml(name.split(' ')[0])}</span>
                            </div>
                            <div class="lb-score">${data.totalScore} pts</div>
                        </div>
                    `;
                    rank++;
                }
                list.innerHTML = html;
            } catch(e) {
                console.error(e);
                list.innerHTML = '<p style="text-align:center; color:var(--accent-red);">Failed to load leaderboard.</p>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.showToast = function(msg, type = 'success') {
            const cont = document.getElementById('toastContainer');
            if (!cont) return;
            const t = document.createElement('div');
            t.className = `toast ${type === 'error' ? 'error' : ''}`;
            t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
            cont.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        };

        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
            showToast(document.body.classList.contains('dark-mode') ? 'Dark Mode ON 🌙' : 'Light Mode ON ☀️');
        };

        window.resetProgress = function() {
            if (confirm('⚠️ RESET ALL PROGRESS ⚠️\n\nAre you sure? All your scores, completed levels, and total points will be permanently lost!')) {
                userProgress = {
                    completedLevels: [],
                    currentLevel: 1,
                    totalScore: 0
                };
                saveProgress();
                initUI();
                showToast('Progress has been reset!', 'success');
                document.getElementById('quizActiveScreen').style.display = 'none';
                document.getElementById('levelMap').style.display = 'block';
            }
        };

        window.loadLeaderboard = loadLeaderboard;

        if (!currentUser) {
            const local = localStorage.getItem('prayerdome_quiz');
            if (local) {
                try { userProgress = JSON.parse(local); } catch(e) {}
            }
            initUI();
            loadLeaderboard();
        }

        window.addEventListener('beforeunload', () => saveProgress());
        console.log('✅ Prayer Dome Quiz v2 - 30 Levels, Unique Questions, Randomized Answers!');
    </script>
</body>
</html>
