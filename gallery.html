<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | Gallery - Capture & Share Moments</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-green: #15803d;
            --accent-green-light: #22c55e;
            --accent-gold: #d4af37;
            --accent-gold-dark: #b45309;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            min-height: 100vh;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
        }

        /* Luxury Font */
        .luxury-font, h1, h2, h3, .stat-number, .image-title { font-family: 'Playfair Display', serif; }

        /* Header with Logo - Increased Size */
        .gallery-header {
            background: var(--bg-card);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        body.dark-mode .gallery-header { background: rgba(15,23,42,0.95); }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-primary);
            cursor: pointer;
        }
        .logo-ring { 
            width: 55px; 
            height: 55px; 
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold)); 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(21,128,61,0.3);
        }
        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            background: white;
            padding: 6px;
        }
        .brand-text h1 { 
            font-size: 1.4rem; 
            font-weight: 900; 
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }
        .brand-text p { 
            font-size: 0.65rem; 
            opacity: 0.7; 
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }
        .theme-btn, .back-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .theme-btn:hover, .back-btn:hover {
            transform: translateY(-2px);
            background: rgba(34,197,94,0.1);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-gold);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-green);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Upload Buttons - Beautiful Design */
        .upload-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .upload-btn-large {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
            padding: 20px;
            border-radius: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }
        .upload-btn-large:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(21,128,61,0.3);
        }
        .camera-btn {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0 20px;
            margin-bottom: 20px;
        }
        .category-btn {
            padding: 10px 24px;
            border-radius: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category-btn.active {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
            border-color: var(--accent-green);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(34,197,94,0.3);
        }
        .category-btn:hover:not(.active) {
            transform: translateY(-2px);
            border-color: var(--accent-gold);
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .gallery-item {
            border-radius: 24px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: fadeInUp 0.5s ease;
        }
        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-gold);
        }
        .image-container {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .gallery-item:hover .image-container img {
            transform: scale(1.1);
        }
        .image-info {
            padding: 18px;
        }
        .image-title {
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--accent-green);
        }
        .image-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Camera Modal */
        .camera-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            z-index: 2000;
        }
        .camera-header {
            padding: 20px;
            background: #000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .camera-header h3 { font-family: 'Playfair Display', serif; }
        .camera-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        #cameraVideo {
            width: 100%;
            max-height: 60vh;
            object-fit: cover;
        }
        .camera-controls {
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--accent-green);
            cursor: pointer;
            transition: 0.2s;
        }
        .capture-btn:active {
            transform: scale(0.9);
        }

        /* Upload Form Modal */
        .upload-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }
        .upload-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .form-group label i { margin-right: 6px; color: var(--accent-gold); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
        }
        .image-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            margin-top: 10px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34,197,94,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
        }
        .toast {
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 40px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--accent-green);
            animation: slideIn 0.3s ease;
            font-weight: 600;
        }
        .toast.error { border-left-color: var(--accent-red); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .main-container { padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .gallery-grid { grid-template-columns: 1fr; }
            .upload-actions { flex-direction: column; }
            .gallery-header { padding: 12px 20px; }
            .logo-ring { width: 45px; height: 45px; }
            .brand-text h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <header class="gallery-header">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <div class="logo-ring">
                <img src="https://i.ibb.co/TB5Fx4tb/logo-0.png" alt="Prayer Dome Logo">
            </div>
            <div class="brand-text">
                <h1>PRAYER DOME</h1>
                <p>GALLERY</p>
            </div>
        </div>
        <div class="header-actions">
            <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Home</a>
            <button class="theme-btn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="main-container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalPhotos">0</div><div class="stat-label"><i class="fas fa-images"></i> Total Photos</div></div>
            <div class="stat-card"><div class="stat-number" id="pastorsCount">0</div><div class="stat-label"><i class="fas fa-church"></i> Pastors & Leaders</div></div>
            <div class="stat-card"><div class="stat-number" id="worshipCount">0</div><div class="stat-label"><i class="fas fa-music"></i> Worship Team</div></div>
            <div class="stat-card"><div class="stat-number" id="locationsCount">0</div><div class="stat-label"><i class="fas fa-map-marker-alt"></i> Church Locations</div></div>
        </div>

        <!-- Upload Buttons -->
        <div class="upload-actions">
            <button class="upload-btn-large" onclick="openCamera()">
                <i class="fas fa-camera"></i> Take Photo
            </button>
            <button class="upload-btn-large camera-btn" onclick="openGalleryUpload()">
                <i class="fas fa-images"></i> Choose from Gallery
            </button>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="category-btn active" onclick="filterGallery('all')"><i class="fas fa-globe"></i> All Photos</button>
            <button class="category-btn" onclick="filterGallery('pastors')"><i class="fas fa-church"></i> Pastors</button>
            <button class="category-btn" onclick="filterGallery('worship')"><i class="fas fa-music"></i> Worship</button>
            <button class="category-btn" onclick="filterGallery('ministries')"><i class="fas fa-hands-helping"></i> Ministries</button>
            <button class="category-btn" onclick="filterGallery('church')"><i class="fas fa-building"></i> Church</button>
        </div>

        <!-- Gallery Grid -->
        <div id="galleryGrid" class="gallery-grid">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="camera-modal">
        <div class="camera-header">
            <h3><i class="fas fa-camera"></i> Take a Photo</h3>
            <button class="back-btn" onclick="closeCamera()" style="background: rgba(255,255,255,0.2);">✕</button>
        </div>
        <div class="camera-preview">
            <video id="cameraVideo" autoplay playsinline></video>
        </div>
        <div class="camera-controls">
            <button class="capture-btn" onclick="capturePhoto()"></button>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="upload-modal">
        <div class="upload-content">
            <h2><i class="fas fa-cloud-upload-alt"></i> Share Your Moment</h2>
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Title *</label>
                <input type="text" id="photoTitle" placeholder="e.g., Sunday Service">
            </div>
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Category *</label>
                <select id="photoCategory">
                    <option value="pastors">Pastors & Leaders</option>
                    <option value="worship">Praise & Worship</option>
                    <option value="ministries">Ministries</option>
                    <option value="church">Church & Locations</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea id="photoDescription" rows="3" placeholder="Share the story behind this photo..."></textarea>
            </div>
            <img id="previewImage" class="image-preview" style="display: none;">
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="submitPhoto()"><i class="fas fa-upload"></i> Share Photo</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="closeUploadModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo",
            authDomain: "prayer-dome.firebaseapp.com",
            projectId: "prayer-dome",
            storageBucket: "prayer-dome.firebasestorage.app",
            messagingSenderId: "198295153196",
            appId: "1:198295153196:web:1222b31948d7974ba3bf89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentFilter = "all";
        let allImages = [];
        let capturedImageData = null;
        let mediaStream = null;

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            loadGallery();
        });

        function loadGallery() {
            const q = query(collection(db, "gallery"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                allImages = [];
                snapshot.forEach(doc => {
                    allImages.push({ id: doc.id, ...doc.data() });
                });
                updateStats();
                renderGallery();
            });
        }

        function updateStats() {
            const approved = allImages.filter(img => img.status === 'approved');
            const pastors = approved.filter(img => img.category === 'pastors').length;
            const worship = approved.filter(img => img.category === 'worship').length;
            const church = approved.filter(img => img.category === 'church' || img.category === 'ministries').length;
            document.getElementById('totalPhotos').textContent = approved.length;
            document.getElementById('pastorsCount').textContent = pastors;
            document.getElementById('worshipCount').textContent = worship;
            document.getElementById('locationsCount').textContent = church;
        }

        function renderGallery() {
            const container = document.getElementById('galleryGrid');
            let filtered = allImages.filter(img => img.status === 'approved');
            if (currentFilter !== 'all') {
                filtered = filtered.filter(img => img.category === currentFilter);
            }
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:60px; grid-column:1/-1;">
                    <i class="fas fa-camera" style="font-size: 64px; opacity: 0.3; margin-bottom: 20px;"></i>
                    <h3 style="font-family: 'Playfair Display', serif;">No photos yet</h3>
                    <p style="margin-top: 10px;">Be the first to share a moment!</p>
                    <button class="btn btn-primary" style="margin-top: 20px;" onclick="openCamera()"><i class="fas fa-camera"></i> Take a Photo</button>
                </div>`;
                return;
            }
            container.innerHTML = filtered.map((img, idx) => `
                <div class="gallery-item" style="animation-delay: ${idx * 0.03}s" onclick="viewImage('${img.url}', '${escapeHtml(img.title)}', '${escapeHtml(img.description || '')}', '${img.category}')">
                    <div class="image-container">
                        <img src="${img.url}" alt="${img.title}" loading="lazy">
                    </div>
                    <div class="image-info">
                        <div class="image-title">${escapeHtml(img.title)}</div>
                        <div class="image-meta">
                            <span><i class="fas fa-user"></i> ${escapeHtml(img.userName || 'Anonymous')}</span>
                            <span><i class="fas fa-clock"></i> ${moment(img.createdAt?.toDate()).fromNow()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openCamera() {
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('cameraVideo');
                video.srcObject = mediaStream;
                document.getElementById('cameraModal').style.display = 'flex';
            } catch (err) {
                showToast('Camera access denied: ' + err.message, 'error');
            }
        }

        function closeCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            document.getElementById('cameraModal').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedImageData = canvas.toDataURL('image/jpeg', 0.9);
            closeCamera();
            const preview = document.getElementById('previewImage');
            preview.src = capturedImageData;
            preview.style.display = 'block';
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function openGalleryUpload() {
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        capturedImageData = event.target.result;
                        const preview = document.getElementById('previewImage');
                        preview.src = capturedImageData;
                        preview.style.display = 'block';
                        document.getElementById('uploadModal').style.display = 'flex';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        async function submitPhoto() {
            const title = document.getElementById('photoTitle').value.trim();
            const category = document.getElementById('photoCategory').value;
            const description = document.getElementById('photoDescription').value.trim();
            if (!title) {
                showToast('Please enter a title', 'error');
                return;
            }
            if (!capturedImageData) {
                showToast('No image captured', 'error');
                return;
            }
            showToast('Uploading...', 'info');
            try {
                const formData = new FormData();
                formData.append('file', capturedImageData);
                formData.append('upload_preset', 'gallery_uploads');
                formData.append('folder', 'prayer_dome_gallery');
                const uploadRes = await fetch('https://api.cloudinary.com/v1_1/prayerdome/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                if (!uploadData.secure_url) throw new Error('Upload failed');
                await addDoc(collection(db, "gallery"), {
                    title: title,
                    description: description || '',
                    category: category,
                    url: uploadData.secure_url,
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'Anonymous',
                    status: 'pending',
                    likes: 0,
                    createdAt: serverTimestamp()
                });
                showToast('Photo submitted for approval!', 'success');
                confetti({ particleCount: 100, spread: 70 });
                document.getElementById('photoTitle').value = '';
                document.getElementById('photoDescription').value = '';
                document.getElementById('previewImage').style.display = 'none';
                capturedImageData = null;
                closeUploadModal();
            } catch (error) {
                console.error('Upload error:', error);
                showToast('Upload failed: ' + error.message, 'error');
            }
        }

        function viewImage(url, title, description, category) {
            const modal = document.createElement('div');
            modal.className = 'upload-modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="upload-content" style="max-width: 600px; text-align: center;">
                    <img src="${url}" style="width: 100%; border-radius: 20px; margin-bottom: 20px;">
                    <h3 style="color: var(--accent-green); font-family: 'Playfair Display', serif;">${title}</h3>
                    <p style="color: var(--text-secondary); margin-top: 10px;">${description}</p>
                    <div class="image-meta" style="margin-top: 15px; justify-content: center;"><span><i class="fas fa-tag"></i> ${category}</span></div>
                    <button class="btn btn-primary" style="margin-top: 25px;" onclick="this.closest('.upload-modal').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function filterGallery(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(category === 'all' ? 'all' : category)) {
                    btn.classList.add('active');
                }
            });
            renderGallery();
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('previewImage').style.display = 'none';
            capturedImageData = null;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-btn i');
            if (btn) btn.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.openCamera = openCamera;
        window.closeCamera = closeCamera;
        window.capturePhoto = capturePhoto;
        window.openGalleryUpload = openGalleryUpload;
        window.submitPhoto = submitPhoto;
        window.filterGallery = filterGallery;
        window.viewImage = viewImage;
        window.closeUploadModal = closeUploadModal;
        window.toggleDarkMode = toggleDarkMode;
    </script>
</body>
</html>
