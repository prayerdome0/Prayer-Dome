<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | Gallery - Capture & Share Moments</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-green: #22c55e;
            --accent-gold: #d4af37;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            min-height: 100vh;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
        }

        /* Header */
        .gallery-header {
            background: linear-gradient(135deg, var(--accent-green), #166534);
            padding: 20px 30px;
            color: white;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text h1 {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .theme-toggle, .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-green);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Upload Buttons */
        .upload-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .upload-btn-large {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            padding: 20px;
            border-radius: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .upload-btn-large:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(34,197,94,0.3);
        }

        .camera-btn {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0 20px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 10px 24px;
            border-radius: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            border-color: var(--accent-green);
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .gallery-item {
            border-radius: 24px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.4s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-gold);
        }

        .image-container {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .image-container img {
            transform: scale(1.1);
        }

        .image-info {
            padding: 16px;
        }

        .image-title {
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--accent-green);
        }

        .image-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Camera Modal */
        .camera-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            z-index: 2000;
        }

        .camera-header {
            padding: 20px;
            background: #000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }

        #cameraVideo {
            width: 100%;
            max-height: 60vh;
            object-fit: cover;
        }

        .camera-controls {
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--accent-green);
            cursor: pointer;
            transition: 0.2s;
        }

        .capture-btn:active {
            transform: scale(0.9);
        }

        /* Upload Form Modal */
        .upload-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .upload-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
        }

        .toast {
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 40px;
            margin-bottom: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-left: 4px solid var(--accent-green);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .main-container { padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .gallery-grid { grid-template-columns: 1fr; }
            .upload-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="gallery-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-images"></i></div>
                <div class="logo-text">
                    <h1>Prayer Dome Gallery</h1>
                </div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
                <button class="theme-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalPhotos">0</div><div class="stat-label">Total Photos</div></div>
            <div class="stat-card"><div class="stat-number" id="pastorsCount">0</div><div class="stat-label">Pastors & Leaders</div></div>
            <div class="stat-card"><div class="stat-number" id="worshipCount">0</div><div class="stat-label">Worship Team</div></div>
            <div class="stat-card"><div class="stat-number" id="locationsCount">0</div><div class="stat-label">Church Locations</div></div>
        </div>

        <!-- Upload Buttons -->
        <div class="upload-actions">
            <button class="upload-btn-large" onclick="openCamera()">
                <i class="fas fa-camera"></i> Take Photo
            </button>
            <button class="upload-btn-large camera-btn" onclick="openGalleryUpload()">
                <i class="fas fa-images"></i> Choose from Gallery
            </button>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="category-btn active" onclick="filterGallery('all')">📸 All Photos</button>
            <button class="category-btn" onclick="filterGallery('pastors')">👨‍🏫 Pastors</button>
            <button class="category-btn" onclick="filterGallery('worship')">🎵 Worship</button>
            <button class="category-btn" onclick="filterGallery('ministries')">🤝 Ministries</button>
            <button class="category-btn" onclick="filterGallery('church')">⛪ Church</button>
        </div>

        <!-- Gallery Grid -->
        <div id="galleryGrid" class="gallery-grid">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="camera-modal">
        <div class="camera-header">
            <h3><i class="fas fa-camera"></i> Take a Photo</h3>
            <button class="back-btn" onclick="closeCamera()" style="background: rgba(255,255,255,0.2);">✕</button>
        </div>
        <div class="camera-preview">
            <video id="cameraVideo" autoplay playsinline></video>
        </div>
        <div class="camera-controls">
            <button class="capture-btn" onclick="capturePhoto()"></button>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="upload-modal">
        <div class="upload-content">
            <h2><i class="fas fa-cloud-upload-alt"></i> Share Your Moment</h2>
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="photoTitle" placeholder="e.g., Sunday Service">
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select id="photoCategory">
                    <option value="pastors">Pastors & Leaders</option>
                    <option value="worship">Praise & Worship</option>
                    <option value="ministries">Ministries</option>
                    <option value="church">Church & Locations</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="photoDescription" rows="3" placeholder="Share the story..."></textarea>
            </div>
            <img id="previewImage" class="image-preview" style="display: none;">
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="submitPhoto()">Share Photo</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="closeUploadModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, getDocs, query, orderBy, where, 
            onSnapshot, serverTimestamp, doc, getDoc, updateDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo",
            authDomain: "prayer-dome.firebaseapp.com",
            projectId: "prayer-dome",
            storageBucket: "prayer-dome.firebasestorage.app",
            messagingSenderId: "198295153196",
            appId: "1:198295153196:web:1222b31948d7974ba3bf89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentFilter = "all";
        let allImages = [];
        let capturedImageData = null;
        let mediaStream = null;

        // Load gallery on auth
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            loadGallery();
        });

        // Load gallery from Firebase
        function loadGallery() {
            const q = query(collection(db, "gallery"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                allImages = [];
                snapshot.forEach(doc => {
                    allImages.push({ id: doc.id, ...doc.data() });
                });
                updateStats();
                renderGallery();
            });
        }

        function updateStats() {
            const approved = allImages.filter(img => img.status === 'approved');
            const pastors = approved.filter(img => img.category === 'pastors').length;
            const worship = approved.filter(img => img.category === 'worship').length;
            const church = approved.filter(img => img.category === 'church' || img.category === 'ministries').length;
            
            document.getElementById('totalPhotos').textContent = approved.length;
            document.getElementById('pastorsCount').textContent = pastors;
            document.getElementById('worshipCount').textContent = worship;
            document.getElementById('locationsCount').textContent = church;
        }

        function renderGallery() {
            const container = document.getElementById('galleryGrid');
            let filtered = allImages.filter(img => img.status === 'approved');
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(img => img.category === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:60px; grid-column:1/-1;">
                    <i class="fas fa-camera" style="font-size: 64px; opacity: 0.3;"></i>
                    <h3>No photos yet</h3>
                    <p>Be the first to share a moment!</p>
                </div>`;
                return;
            }

            container.innerHTML = filtered.map(img => `
                <div class="gallery-item" onclick="viewImage('${img.url}', '${escapeHtml(img.title)}', '${escapeHtml(img.description || '')}', '${img.category}')">
                    <div class="image-container">
                        <img src="${img.url}" alt="${img.title}" loading="lazy">
                    </div>
                    <div class="image-info">
                        <div class="image-title">${escapeHtml(img.title)}</div>
                        <div class="image-meta">
                            <span><i class="fas fa-user"></i> ${escapeHtml(img.userName || 'Anonymous')}</span>
                            <span><i class="fas fa-clock"></i> ${moment(img.createdAt?.toDate()).fromNow()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Camera Functions
        async function openCamera() {
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }
            
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('cameraVideo');
                video.srcObject = mediaStream;
                document.getElementById('cameraModal').style.display = 'flex';
            } catch (err) {
                showToast('Camera access denied: ' + err.message, 'error');
            }
        }

        function closeCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            document.getElementById('cameraModal').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            capturedImageData = canvas.toDataURL('image/jpeg', 0.9);
            
            closeCamera();
            
            // Show upload modal with preview
            const preview = document.getElementById('previewImage');
            preview.src = capturedImageData;
            preview.style.display = 'block';
            document.getElementById('uploadModal').style.display = 'flex';
        }

        // Gallery Upload
        function openGalleryUpload() {
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }
            
            // Create file input for gallery
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        capturedImageData = event.target.result;
                        const preview = document.getElementById('previewImage');
                        preview.src = capturedImageData;
                        preview.style.display = 'block';
                        document.getElementById('uploadModal').style.display = 'flex';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        async function submitPhoto() {
            const title = document.getElementById('photoTitle').value.trim();
            const category = document.getElementById('photoCategory').value;
            const description = document.getElementById('photoDescription').value.trim();

            if (!title) {
                showToast('Please enter a title', 'error');
                return;
            }
            if (!capturedImageData) {
                showToast('No image captured', 'error');
                return;
            }

            showToast('Uploading...', 'info');
            
            try {
                // Upload to Cloudinary
                const formData = new FormData();
                formData.append('file', capturedImageData);
                formData.append('upload_preset', 'gallery_uploads');
                formData.append('folder', 'prayer_dome_gallery');
                
                const uploadRes = await fetch('https://api.cloudinary.com/v1_1/prayerdome/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                
                if (!uploadData.secure_url) throw new Error('Upload failed');
                
                // Save to Firestore
                await addDoc(collection(db, "gallery"), {
                    title: title,
                    description: description || '',
                    category: category,
                    url: uploadData.secure_url,
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'Anonymous',
                    status: 'pending',
                    likes: 0,
                    createdAt: serverTimestamp()
                });
                
                showToast('Photo submitted for approval!', 'success');
                confetti({ particleCount: 100, spread: 70 });
                
                // Reset form
                document.getElementById('photoTitle').value = '';
                document.getElementById('photoDescription').value = '';
                document.getElementById('previewImage').style.display = 'none';
                capturedImageData = null;
                closeUploadModal();
                
            } catch (error) {
                console.error('Upload error:', error);
                showToast('Upload failed: ' + error.message, 'error');
            }
        }

        function viewImage(url, title, description, category) {
            const modal = document.createElement('div');
            modal.className = 'upload-modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="upload-content" style="max-width: 600px; text-align: center;">
                    <img src="${url}" style="width: 100%; border-radius: 16px; margin-bottom: 20px;">
                    <h3 style="color: var(--accent-green);">${title}</h3>
                    <p style="color: var(--text-secondary);">${description}</p>
                    <div style="margin-top: 20px;">
                        <button class="btn btn-primary" onclick="this.closest('.upload-modal').remove()">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function filterGallery(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(category === 'all' ? 'All' : category.charAt(0).toUpperCase() + category.slice(1))) {
                    btn.classList.add('active');
                }
            });
            renderGallery();
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('previewImage').style.display = 'none';
            capturedImageData = null;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Global functions
        window.openCamera = openCamera;
