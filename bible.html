<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prayer Dome | Holy Bible Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --accent-green: #15803d;
            --accent-green-light: #22c55e;
            --accent-gold: #d4af37;
            --accent-gold-dark: #b45309;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding-bottom: 140px; }
        body.dark-mode { --bg-primary: #0f172a; --bg-card: #1e293b; --text-primary: #f8fafc; --text-secondary: #cbd5e1; --border-color: #334155; }

        /* Luxury Font */
        .luxury-font, h1, h2, .chapter-title { font-family: 'Playfair Display', serif; }

        /* Header with Logo */
        .bible-header { 
            background: var(--bg-card); 
            padding: 12px 25px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        body.dark-mode .bible-header { background: rgba(15,23,42,0.95); }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            cursor: pointer;
        }
        .logo-ring { 
            width: 48px; 
            height: 48px; 
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold)); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(21,128,61,0.3);
        }
        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
            background: white;
            padding: 5px;
        }
        .brand-text h1 { 
            font-size: 1.3rem; 
            font-weight: 900; 
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }
        .brand-text p { 
            font-size: 0.6rem; 
            opacity: 0.7; 
            letter-spacing: 1px;
        }

        .theme-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 14px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .theme-btn:hover { transform: scale(1.05); background: rgba(34,197,94,0.1); }

        /* Progress Bar */
        .progress-container {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .progress-bar-bg {
            background: var(--bg-primary);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-gold));
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .progress-stats {
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-sub);
            text-align: right;
        }

        .app-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .app-tabs { display: flex; gap: 10px; background: var(--bg-card); padding: 8px; border-radius: 60px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .app-tab { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 700; cursor: pointer; border-radius: 50px; color: var(--text-secondary); transition: 0.2s; text-align: center; font-size: 0.9rem; }
        .app-tab.active { background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light)); color: white; box-shadow: 0 4px 12px rgba(34,197,94,0.3); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .controls-panel { background: var(--bg-card); border-radius: 24px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .version-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .version-btn { padding: 8px 18px; border-radius: 30px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-secondary); font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .version-btn.active { background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light)); border-color: var(--accent-green); color: white; }
        .version-btn:hover { transform: translateY(-2px); }

        .nav-controls { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-controls select { flex: 1; min-width: 130px; padding: 12px 15px; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-weight: 600; outline: none; cursor: pointer; }
        .btn-read { background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dark)); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-read:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }

        .bible-reader { background: var(--bg-card); border-radius: 32px; padding: 35px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); font-family: 'Merriweather', serif; font-size: 1.2rem; line-height: 2.2; }
        .chapter-title { text-align: center; font-size: 2rem; color: var(--accent-green); margin-bottom: 30px; border-bottom: 3px solid var(--accent-gold); display: inline-block; width: auto; padding-bottom: 10px; }

        .verse-item { display: inline; padding: 2px 4px; border-radius: 6px; cursor: pointer; transition: 0.2s; position: relative; }
        .verse-item:hover { background: rgba(34,197,94,0.1); }
        .verse-item.selected { background: rgba(212,175,55,0.2); border-radius: 8px; }
        .verse-item.reading { background: rgba(34,197,94,0.2); color: var(--accent-green); font-weight: bold; }
        .verse-num { font-size: 0.7rem; font-weight: 800; color: var(--accent-gold); vertical-align: super; margin-right: 6px; font-family: 'Inter', sans-serif; }

        /* Reading Plan - Books Grid */
        .reading-plan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .book-progress-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }
        .book-progress-card:hover { transform: translateY(-3px); border-color: var(--accent-gold); }
        .book-name { font-weight: 800; font-size: 0.85rem; }
        .book-chapters { font-size: 0.7rem; color: var(--text-sub); margin: 5px 0; }
        .book-progress-bar { height: 4px; background: var(--bg-primary); border-radius: 5px; overflow: hidden; margin-top: 8px; }
        .book-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-gold)); width: 0%; border-radius: 5px; }
        .book-complete-badge { color: var(--accent-green); font-size: 0.7rem; }

        /* Notebook */
        .notebook-item { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border-color); border-left: 5px solid var(--accent-gold); transition: 0.2s; }
        .notebook-item:hover { transform: translateX(5px); }
        .notebook-ref { color: var(--accent-green); font-weight: 800; margin-bottom: 8px; }
        .notebook-text { font-size: 0.95rem; line-height: 1.6; }
        .notebook-date { font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; }

        /* Search Results */
        .search-result-item { background: var(--bg-card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; }
        .search-result-item:hover { transform: translateX(5px); border-left: 4px solid var(--accent-gold); }
        .search-result-ref { color: var(--accent-green); font-weight: 800; font-size: 0.9rem; margin-bottom: 8px; }
        .search-result-text { font-size: 0.95rem; line-height: 1.6; color: var(--text-secondary); }

        .action-bar { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; display: none; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; align-items: center; }
        .action-bar button { background: none; border: none; color: white; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .action-bar button:hover { transform: scale(1.1); color: var(--accent-gold); }

        .audio-player { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: 12px 20px; display: none; justify-content: space-between; align-items: center; z-index: 999; flex-wrap: wrap; gap: 10px; }

        .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-card); border-radius: 28px; padding: 30px; width: 90%; max-width: 500px; animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-content textarea { width: 100%; height: 120px; padding: 12px; border-radius: 16px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); margin: 15px 0; font-family: inherit; }

        @media (max-width: 600px) {
            .bible-reader { padding: 20px; font-size: 1rem; }
            .chapter-title { font-size: 1.4rem; }
            .action-bar { padding: 8px 16px; gap: 12px; bottom: 100px; }
            .reading-plan-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .logo-ring { width: 40px; height: 40px; }
            .brand-text h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header class="bible-header">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <div class="logo-ring">
                <img src="https://i.ibb.co/TB5Fx4tb/logo-0.png" alt="Prayer Dome Logo">
            </div>
            <div class="brand-text">
                <h1>PRAYER DOME</h1>
                <p>HOLY BIBLE</p>
            </div>
        </div>
        <button class="theme-btn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
    </header>

    <div class="app-wrapper">
        <div class="app-tabs">
            <button class="app-tab active" onclick="switchTab('read')"><i class="fas fa-book-open"></i> Read</button>
            <button class="app-tab" onclick="switchTab('progress')"><i class="fas fa-chart-line"></i> Progress</button>
            <button class="app-tab" onclick="switchTab('notebook')"><i class="fas fa-bookmark"></i> Notebook</button>
            <button class="app-tab" onclick="switchTab('search')"><i class="fas fa-search"></i> Search</button>
        </div>

        <!-- READ TAB -->
        <div id="tab-read" class="tab-content active">
            <!-- Reading Progress Bar -->
            <div class="progress-container">
                <div class="progress-header">
                    <span><i class="fas fa-bible"></i> Bible Reading Progress</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-stats">
                    <span id="chaptersRead">0</span> / <span id="totalChapters">1189</span> chapters completed
                </div>
            </div>

            <div class="controls-panel">
                <div class="version-selector">
                    <button class="version-btn active" onclick="setVersion('NIV')">NIV</button>
                    <button class="version-btn" onclick="setVersion('KJV')">KJV</button>
                    <button class="version-btn" onclick="setVersion('NLT')">NLT</button>
                    <button class="version-btn" onclick="setVersion('ESV')">ESV</button>
                    <button class="version-btn" onclick="setVersion('MSG')">MSG</button>
                </div>
                <div class="nav-controls">
                    <select id="bookSelect" onchange="updateChapters()"></select>
                    <select id="chapterSelect"></select>
                    <button class="btn-read" onclick="fetchChapter()"><i class="fas fa-bible"></i> READ CHAPTER</button>
                </div>
            </div>

            <div class="bible-reader" id="bibleReader">
                <div style="text-align:center; padding:50px 0; opacity:0.6;">
                    <i class="fas fa-book-reader fa-4x" style="color: var(--accent-gold);"></i>
                    <h3 style="margin-top:20px;">Select a Chapter to Begin</h3>
                </div>
            </div>
        </div>

        <!-- PROGRESS TAB -->
        <div id="tab-progress" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--accent-green); font-family: 'Playfair Display', serif;">
                <i class="fas fa-chart-line"></i> Reading Progress by Book
            </h2>
            <div id="readingPlanGrid" class="reading-plan-grid"></div>
        </div>

        <!-- NOTEBOOK TAB -->
        <div id="tab-notebook" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--accent-green); font-family: 'Playfair Display', serif;"><i class="fas fa-bookmark"></i> My Notes & Favorites</h2>
                <button class="btn-read" style="padding: 8px 20px;" onclick="openNoteModal(true)"><i class="fas fa-plus"></i> New Note</button>
            </div>
            <div id="notebookList"></div>
        </div>

        <!-- SEARCH TAB -->
        <div id="tab-search" class="tab-content">
            <div class="controls-panel">
                <input type="text" id="searchInput" placeholder="Search scriptures (e.g., love, faith, Jesus)..." style="width:100%; padding:14px; border-radius:16px; border:2px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 1rem;">
                <button class="btn-read" style="width:100%; margin-top:12px;" onclick="searchBible()"><i class="fas fa-search"></i> Search Bible</button>
            </div>
            <div id="searchResults"></div>
        </div>
    </div>

    <!-- Floating Action Bar -->
    <div class="action-bar" id="actionBar">
        <button onclick="copyVerse()" title="Copy Verse"><i class="fas fa-copy"></i></button>
        <button onclick="saveNoteFromVerse()" title="Save Note"><i class="fas fa-bookmark"></i></button>
        <button onclick="startAudioFromSelected()" title="Listen"><i class="fas fa-play-circle"></i></button>
    </div>

    <!-- Audio Player -->
    <div class="audio-player" id="audioPlayer">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-headphones" style="color:var(--accent-green); font-size: 1.3rem;"></i>
            <div>
                <b id="audioRef">Select a chapter</b>
                <p style="font-size:10px; opacity:0.6;" id="audioVer"></p>
            </div>
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <button onclick="audioSkip(-1)"><i class="fas fa-step-backward"></i></button>
            <button onclick="toggleAudio()" id="playBtn" style="width:45px; height:45px; background:var(--accent-green); color:white; border:none; border-radius:50%; cursor:pointer;"><i class="fas fa-play"></i></button>
            <button onclick="audioSkip(1)"><i class="fas fa-step-forward"></i></button>
        </div>
        <select id="audioSpeed" style="padding:5px 10px; border-radius:20px;">
            <option value="0.8">0.8x</option>
            <option value="1" selected>1x</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
        </select>
    </div>

    <!-- Note Modal -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <h3 style="color: var(--accent-green); font-family: 'Playfair Display', serif;"><i class="fas fa-pen-fancy"></i> Add Note</h3>
            <p id="noteRef" style="color: var(--accent-gold); margin: 10px 0;"></p>
            <textarea id="noteText" placeholder="Write your thoughts, insights, or prayer points..."></textarea>
            <div style="display: flex; gap: 12px;">
                <button class="btn-read" style="flex:1;" onclick="saveNote()">Save Note</button>
                <button class="btn-read" style="flex:1; background: var(--accent-red);" onclick="closeModal('noteModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo", 
            authDomain: "prayer-dome.firebaseapp.com", 
            projectId: "prayer-dome", 
            storageBucket: "prayer-dome.firebasestorage.app", 
            messagingSenderId: "198295153196", 
            appId: "1:198295153196:web:1222b31948d7974ba3bf89" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentVersion = 'NIV';
        let currentVerses = [];
        let selectedVerseIdx = null;
        let currentBookName = "";
        let currentChapter = "";
        let readChapters = new Set(); // Track read chapters as "BookName ChapterNumber"
        let notes = [];

        // Bible Books with chapter counts
        const bibleBooks = [
            {name:"Genesis", ch:50, id:1}, {name:"Exodus", ch:40, id:2}, {name:"Leviticus", ch:27, id:3}, {name:"Numbers", ch:36, id:4}, {name:"Deuteronomy", ch:34, id:5},
            {name:"Joshua", ch:24, id:6}, {name:"Judges", ch:21, id:7}, {name:"Ruth", ch:4, id:8}, {name:"1 Samuel", ch:31, id:9}, {name:"2 Samuel", ch:24, id:10},
            {name:"1 Kings", ch:22, id:11}, {name:"2 Kings", ch:25, id:12}, {name:"1 Chronicles", ch:29, id:13}, {name:"2 Chronicles", ch:36, id:14}, {name:"Ezra", ch:10, id:15},
            {name:"Nehemiah", ch:13, id:16}, {name:"Esther", ch:10, id:17}, {name:"Job", ch:42, id:18}, {name:"Psalms", ch:150, id:19}, {name:"Proverbs", ch:31, id:20},
            {name:"Ecclesiastes", ch:12, id:21}, {name:"Song of Solomon", ch:8, id:22}, {name:"Isaiah", ch:66, id:23}, {name:"Jeremiah", ch:52, id:24}, {name:"Lamentations", ch:5, id:25},
            {name:"Ezekiel", ch:48, id:26}, {name:"Daniel", ch:12, id:27}, {name:"Hosea", ch:14, id:28}, {name:"Joel", ch:3, id:29}, {name:"Amos", ch:9, id:30},
            {name:"Obadiah", ch:1, id:31}, {name:"Jonah", ch:4, id:32}, {name:"Micah", ch:7, id:33}, {name:"Nahum", ch:3, id:34}, {name:"Habakkuk", ch:3, id:35},
            {name:"Zephaniah", ch:3, id:36}, {name:"Haggai", ch:2, id:37}, {name:"Zechariah", ch:14, id:38}, {name:"Malachi", ch:4, id:39},
            {name:"Matthew", ch:28, id:40}, {name:"Mark", ch:16, id:41}, {name:"Luke", ch:24, id:42}, {name:"John", ch:21, id:43}, {name:"Acts", ch:28, id:44},
            {name:"Romans", ch:16, id:45}, {name:"1 Corinthians", ch:16, id:46}, {name:"2 Corinthians", ch:13, id:47}, {name:"Galatians", ch:6, id:48}, {name:"Ephesians", ch:6, id:49},
            {name:"Philippians", ch:4, id:50}, {name:"Colossians", ch:4, id:51}, {name:"1 Thessalonians", ch:5, id:52}, {name:"2 Thessalonians", ch:3, id:53}, {name:"1 Timothy", ch:6, id:54},
            {name:"2 Timothy", ch:4, id:55}, {name:"Titus", ch:3, id:56}, {name:"Philemon", ch:1, id:57}, {name:"Hebrews", ch:13, id:58}, {name:"James", ch:5, id:59},
            {name:"1 Peter", ch:5, id:60}, {name:"2 Peter", ch:3, id:61}, {name:"1 John", ch:5, id:62}, {name:"2 John", ch:1, id:63}, {name:"3 John", ch:1, id:64},
            {name:"Jude", ch:1, id:65}, {name:"Revelation", ch:22, id:66}
        ];

        const TOTAL_CHAPTERS = bibleBooks.reduce((sum, b) => sum + b.ch, 0);

        // Load user's reading progress from Firestore
        async function loadReadingProgress() {
            if (!currentUser) {
                // Try localStorage for guest
                const saved = localStorage.getItem('bible_read_chapters');
                if (saved) {
                    readChapters = new Set(JSON.parse(saved));
                }
                updateProgressUI();
                renderReadingPlan();
                return;
            }
            
            try {
                const progressRef = doc(db, "bibleProgress", currentUser.uid);
                const progressDoc = await getDoc(progressRef);
                if (progressDoc.exists()) {
                    const data = progressDoc.data();
                    readChapters = new Set(data.readChapters || []);
                } else {
                    await setDoc(progressRef, { readChapters: [], lastUpdated: serverTimestamp() });
                }
                updateProgressUI();
                renderReadingPlan();
            } catch (error) {
                console.error("Error loading progress:", error);
            }
        }

        // Save reading progress when a chapter is read
        async function saveChapterProgress(book, chapter) {
            const chapterKey = `${book} ${chapter}`;
            if (readChapters.has(chapterKey)) return;
            
            readChapters.add(chapterKey);
            
            if (!currentUser) {
                localStorage.setItem('bible_read_chapters', JSON.stringify([...readChapters]));
                updateProgressUI();
                renderReadingPlan();
                return;
            }
            
            try {
                const progressRef = doc(db, "bibleProgress", currentUser.uid);
                await updateDoc(progressRef, {
                    readChapters: [...readChapters],
                    lastUpdated: serverTimestamp()
                });
                updateProgressUI();
                renderReadingPlan();
                // Show small celebration
                confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 } });
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.style.cssText = 'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--accent-green); color:white; padding:8px 20px; border-radius:30px; z-index:2000; font-weight:600;';
                toast.innerHTML = '📖 Chapter marked as read!';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            } catch (error) {
                console.error("Error saving progress:", error);
            }
        }

        function updateProgressUI() {
            const chaptersRead = readChapters.size;
            const percent = Math.round((chaptersRead / TOTAL_CHAPTERS) * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressPercent').innerText = `${percent}%`;
            document.getElementById('chaptersRead').innerText = chaptersRead;
            document.getElementById('totalChapters').innerText = TOTAL_CHAPTERS;
        }

        function renderReadingPlan() {
            const container = document.getElementById('readingPlanGrid');
            if (!container) return;
            
            container.innerHTML = bibleBooks.map(book => {
                const chaptersReadCount = [...readChapters].filter(key => key.startsWith(book.name + ' ')).length;
                const percent = Math.round((chaptersReadCount / book.ch) * 100);
                const isComplete = chaptersReadCount === book.ch;
                
                return `
                    <div class="book-progress-card" onclick="goToBook('${book.name}')">
                        <div class="book-name">${book.name}</div>
                        <div class="book-chapters">${chaptersReadCount}/${book.ch} chapters</div>
                        <div class="book-progress-bar">
                            <div class="book-progress-fill" style="width: ${percent}%"></div>
                        </div>
                        ${isComplete ? '<div class="book-complete-badge"><i class="fas fa-check-circle"></i> Complete</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        window.goToBook = (bookName) => {
            const bookIndex = bibleBooks.findIndex(b => b.name === bookName);
            if (bookIndex !== -1) {
                document.getElementById('bookSelect').value = bookIndex;
                updateChapters();
                document.getElementById('chapterSelect').value = 1;
                fetchChapter();
                switchTab('read');
            }
        };

        // Initialize selects
        function init() {
            const bSel = document.getElementById('bookSelect');
            bibleBooks.forEach((b, i) => bSel.innerHTML += `<option value="${i}">${b.name}</option>`);
            updateChapters();
        }

        window.updateChapters = () => {
            const bIdx = parseInt(document.getElementById('bookSelect').value);
            const cSel = document.getElementById('chapterSelect');
            cSel.innerHTML = "";
            for(let i=1; i<=bibleBooks[bIdx].ch; i++) cSel.innerHTML += `<option value="${i}">Chapter ${i}</option>`;
        };

        window.setVersion = (v) => {
            currentVersion = v;
            document.querySelectorAll('.version-btn').forEach(b => b.classList.toggle('active', b.innerText === v));
            if(currentVerses.length > 0) fetchChapter();
        };

        window.fetchChapter = async () => {
            const bIdx = parseInt(document.getElementById('bookSelect').value);
            const bookId = bIdx + 1;
            currentBookName = bibleBooks[bIdx].name;
            currentChapter = document.getElementById('chapterSelect').value;
            const reader = document.getElementById('bibleReader');

            reader.innerHTML = '<div class="loading-spinner"></div>';
            
            try {
                let data = [];
                if (currentVersion === 'KJV') {
                    const res = await fetch(`https://bible-api.com/${currentBookName}+${currentChapter}?translation=kjv`);
                    const json = await res.json();
                    data = json.verses || [];
                } else {
                    const res = await fetch(`https://bolls.life/get-chapter/${currentVersion}/${bookId}/${currentChapter}/`);
                    data = await res.json();
                    data = data.map(v => ({ verse: v.verse, text: v.text?.replace(/<(?:.|\n)*?>/gm, '') || v.text }));
                }
                
                currentVerses = data;
                render(currentBookName, currentChapter);
                
                // Save progress for this chapter
                await saveChapterProgress(currentBookName, currentChapter);
                
                document.getElementById('audioRef').innerText = `${currentBookName} ${currentChapter}`;
                document.getElementById('audioVer').innerHTML = `${currentVersion} Version`;
                document.getElementById('audioPlayer').style.display = 'flex';
                
            } catch (e) {
                console.error("Fetch error:", e);
                reader.innerHTML = "<p style='text-align:center; padding:20px;'>Error loading chapter. Please try again.</p>";
            }
        };

        function render(book, ch) {
            let html = `<div class="chapter-title">${book} ${ch}</div><div class="verses-container">`;
            currentVerses.forEach((v, i) => {
                const verseText = v.text || '';
                html += `<span class="verse-item" id="v-${i}" onclick="selVerse(${i})"><span class="verse-num">${v.verse}</span>${verseText}</span> `;
            });
            html += "</div>";
            document.getElementById('bibleReader').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.selVerse = (i) => {
            selectedVerseIdx = i;
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
            const el = document.getElementById(`v-${i}`);
            if (el) {
                el.classList.add('selected');
                document.getElementById('actionBar').style.display = 'flex';
                setTimeout(() => {
                    const bar = document.getElementById('actionBar');
                    if(bar && bar.style.display === 'flex') bar.style.display = 'none';
                }, 5000);
            }
        };

        window.copyVerse = () => {
            if (selectedVerseIdx !== null && currentVerses[selectedVerseIdx]) {
                const v = currentVerses[selectedVerseIdx];
                navigator.clipboard.writeText(`${v.text} — ${currentBookName} ${currentChapter}:${v.verse}`);
                alert("✓ Verse copied to clipboard!");
                document.getElementById('actionBar').style.display = 'none';
            }
        };

        window.saveNoteFromVerse = () => {
            if (selectedVerseIdx === null) return;
            const v = currentVerses[selectedVerseIdx];
            document.getElementById('noteRef').innerHTML = `${currentBookName} ${currentChapter}:${v.verse}`;
            document.getElementById('noteText').value = '';
            document.getElementById('noteModal').style.display = 'flex';
        };

        window.saveNote = async () => {
            const noteText = document.getElementById('noteText').value;
            const ref = document.getElementById('noteRef').innerHTML;
            if (!noteText) return;
            
            if (currentUser) {
                try {
                    await addDoc(collection(db, "bibleNotes", currentUser.uid, "notes"), {
                        reference: ref,
                        note: noteText,
                        type: 'note',
                        timestamp: serverTimestamp()
                    });
                    showToast("Note saved!", "success");
                } catch(e) { console.error(e); }
            } else {
                // Local storage for guests
                const localNotes = JSON.parse(localStorage.getItem('bible_notes') || '[]');
                localNotes.unshift({ reference: ref, note: noteText, date: new Date().toISOString() });
                localStorage.setItem('bible_notes', JSON.stringify(localNotes));
                showToast("Note saved locally!", "success");
            }
            closeModal('noteModal');
            loadNotes();
        };

        window.openNoteModal = (isGeneral) => {
            if (isGeneral) {
                document.getElementById('noteRef').innerHTML = "General Study Note";
                document.getElementById('noteText').value = '';
                document.getElementById('noteModal').style.display = 'flex';
            }
        };

        async function loadNotes() {
            const container = document.getElementById('notebookList');
            if (!container) return;
            
            let notesList = [];
            
            if (currentUser) {
                try {
                    const notesRef = collection(db, "bibleNotes", currentUser.uid, "notes");
                    const q = query(notesRef, orderBy("timestamp", "desc"));
                    const snapshot = await getDocs(q);
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        notesList.push({
                            reference: data.reference,
                            note: data.note,
                            date: data.timestamp?.toDate() || new Date()
                        });
                    });
                } catch(e) { console.error(e); }
            } else {
                const localNotes = JSON.parse(localStorage.getItem('bible_notes') || '[]');
                notesList = localNotes;
            }
            
            if (notesList.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;"><i class="fas fa-book-open"></i><p>No notes yet. Select a verse to save!</p></div>';
                return;
            }
            
            container.innerHTML = notesList.map(n => `
                <div class="notebook-item">
                    <div class="notebook-ref"><i class="fas fa-pen"></i> ${n.reference}</div>
                    <div class="notebook-text">${escapeHtml(n.note)}</div>
                    <div class="notebook-date"><i class="far fa-clock"></i> ${moment(n.date).format('MMM D, YYYY')}</div>
                </div>
            `).join('');
        }

        // Search Bible
        window.searchBible = async () => {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            if (!query) return;
            resultsDiv.innerHTML = '<div class="loading-spinner"></div>';
            
            try {
                const res = await fetch(`https://bolls.life/search/${currentVersion}/?search=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (!data || data.length === 0) {
                    resultsDiv.innerHTML = '<div style="text-align:center; padding:40px;">No results found</div>';
                    return;
                }
                resultsDiv.innerHTML = data.slice(0, 30).map(item => `
                    <div class="search-result-item" onclick="goToChapterAndVerse('${item.book_name}', ${item.chapter}, ${item.verse})">
                        <div class="search-result-ref"><i class="fas fa-bible"></i> ${item.book_name} ${item.chapter}:${item.verse}</div>
                        <div class="search-result-text">${escapeHtml(item.text)}</div>
                    </div>
                `).join('');
            } catch (error) {
                resultsDiv.innerHTML = '<div style="text-align:center; padding:40px;">Search error</div>';
            }
        };

        window.goToChapterAndVerse = (bookName, chapter, verse) => {
            const bookIndex = bibleBooks.findIndex(b => b.name === bookName);
            if (bookIndex !== -1) {
                document.getElementById('bookSelect').value = bookIndex;
                updateChapters();
                document.getElementById('chapterSelect').value = chapter;
                fetchChapter().then(() => {
                    setTimeout(() => {
                        const verseIdx = currentVerses.findIndex(v => v.verse == verse);
                        if(verseIdx !== -1) {
                            selVerse(verseIdx);
                            const el = document.getElementById(`v-${verseIdx}`);
                            if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 800);
                });
                switchTab('read');
            }
        };

        // Audio Functions
        let speech = window.speechSynthesis;
        let isReading = false;
        let readIdx = 0;

        window.startAudioFromSelected = () => {
            if (selectedVerseIdx !== null) {
                stopAudio();
                readIdx = selectedVerseIdx;
                playAudio();
                document.getElementById('actionBar').style.display = 'none';
            }
        };

        function playAudio() {
            if (readIdx >= currentVerses.length) {
                stopAudio();
                return;
            }
            if (speech.speaking) speech.cancel();
            
            const utter = new SpeechSynthesisUtterance(currentVerses[readIdx].text);
            utter.rate = parseFloat(document.getElementById('audioSpeed').value);
            utter.onend = () => {
                readIdx++;
                if (isReading && readIdx < currentVerses.length) playAudio();
                else if (readIdx >= currentVerses.length) stopAudio();
            };
            
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('reading'));
            const el = document.getElementById(`v-${readIdx}`);
            if (el) {
                el.classList.add('reading');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            speech.speak(utter);
            isReading = true;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        window.toggleAudio = () => {
            if (isReading && speech.speaking) {
                speech.cancel();
                isReading = false;
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            } else if (isReading && !speech.speaking) {
                playAudio();
            } else {
                readIdx = selectedVerseIdx || 0;
                playAudio();
            }
        };

        window.audioSkip = (dir) => {
            readIdx += dir;
            if (readIdx < 0) readIdx = 0;
            if (readIdx >= currentVerses.length) readIdx = currentVerses.length - 1;
            if (isReading) {
                if (speech.speaking) speech.cancel();
                playAudio();
            }
        };

        function stopAudio() {
            if (speech.speaking) speech.cancel();
            isReading = false;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('reading'));
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.app-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (tab === 'notebook') loadNotes();
            if (tab === 'progress') renderReadingPlan();
        };

        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:${type === 'success' ? 'var(--accent-green)' : 'var(--accent-red)'}; color:white; padding:10px 20px; border-radius:30px; z-index:2000; font-weight:600;`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            loadReadingProgress();
            loadNotes();
        });

        init();
        
        // Make functions global
        window.fetchChapter = fetchChapter;
        window.setVersion = setVersion;
        window.selVerse = selVerse;
        window.copyVerse = copyVerse;
        window.saveNoteFromVerse = saveNoteFromVerse;
        window.startAudioFromSelected = startAudioFromSelected;
        window.toggleAudio = toggleAudio;
        window.audioSkip = audioSkip;
        window.searchBible = searchBible;
        window.goToChapterAndVerse = goToChapterAndVerse;
        window.saveNote = saveNote;
        window.openNoteModal = openNoteModal;
        window.switchTab = switchTab;
        window.toggleDarkMode = toggleDarkMode;
    </script>
</body>
</html>
