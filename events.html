<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | Events Calendar - Services & Gatherings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent-green: #15803d;
            --accent-green-light: #22c55e;
            --accent-gold: #d4af37;
            --accent-gold-dark: #b45309;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            min-height: 100vh;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
        }

        /* Luxury Font */
        .luxury-font, h1, h2, h3, .stat-number, .current-month, .event-title { font-family: 'Playfair Display', serif; }

        /* Header with Logo - Increased Size */
        .events-header {
            background: var(--bg-card);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        body.dark-mode .events-header { background: rgba(15,23,42,0.95); }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-primary);
            cursor: pointer;
        }
        .logo-ring { 
            width: 55px; 
            height: 55px; 
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold)); 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(21,128,61,0.3);
        }
        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            background: white;
            padding: 6px;
        }
        .brand-text h1 { 
            font-size: 1.4rem; 
            font-weight: 900; 
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }
        .brand-text p { 
            font-size: 0.65rem; 
            opacity: 0.7; 
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }
        .theme-btn, .back-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .theme-btn:hover, .back-btn:hover {
            transform: translateY(-2px);
            background: rgba(34,197,94,0.1);
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Add Event Button Bar - Below Header */
        .action-bar {
            background: var(--bg-card);
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .add-event-btn {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(34,197,94,0.3);
        }
        .add-event-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(34,197,94,0.4);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-gold);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-green);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 1px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Calendar and Events Layout */
        .calendar-events-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Calendar Styles */
        .calendar-container {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .calendar-nav {
            display: flex;
            gap: 12px;
        }
        .calendar-nav button {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .calendar-nav button:hover {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
            border-color: var(--accent-green);
            transform: translateY(-2px);
        }
        .current-month {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-green);
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            padding: 10px 0;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: var(--bg-primary);
            font-weight: 600;
        }
        .calendar-day:hover {
            background: rgba(34,197,94,0.1);
            transform: scale(1.02);
        }
        .calendar-day.today {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light));
            color: white;
        }
        .calendar-day.has-event {
            border: 2px solid var(--accent-gold);
        }
        .calendar-day.selected {
            background: var(--accent-green);
            color: white;
            transform: scale(1.05);
        }
        .event-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-gold);
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Events List */
        .events-list-container {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        .events-list-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }
        .events-list-header h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Playfair Display', serif;
        }
        .events-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .event-item {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
            border-left: 4px solid var(--accent-green);
        }
        .event-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
            border-left-color: var(--accent-gold);
        }
        .event-time {
            font-size: 0.75rem;
            color: var(--accent-gold);
            font-weight: 700;
            margin-bottom: 5px;
        }
        .event-title {
            font-weight: 800;
            margin-bottom: 5px;
        }
        .event-location {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .event-category {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            margin-top: 8px;
            font-weight: 700;
        }

        /* My Events Section */
        .my-events-section {
            margin-top: 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-green);
        }

        /* Modal */
        .event-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .event-modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .event-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .event-modal-header h2 { font-family: 'Playfair Display', serif; color: var(--accent-green); }
        .event-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .event-detail { margin-bottom: 20px; }
        .event-detail-label { font-weight: 700; color: var(--accent-gold); margin-bottom: 5px; font-size: 0.8rem; }
        .rsvp-buttons { display: flex; gap: 12px; margin-top: 20px; }

        .btn {
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent-green), var(--accent-green-light)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(34,197,94,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--accent-green); color: var(--accent-green); }
        .btn-danger { background: linear-gradient(135deg, var(--accent-red), #dc2626); color: white; }
        .btn-small { padding: 6px 12px; font-size: 0.75rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1100; }
        .toast { background: var(--bg-card); padding: 12px 24px; border-radius: 40px; margin-bottom: 8px; box-shadow: var(--shadow-lg); border-left: 4px solid var(--accent-green); animation: slideIn 0.3s ease; font-weight: 600; }
        .toast.error { border-left-color: var(--accent-red); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .calendar-events-layout { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .main-container { padding: 20px; }
            .action-bar { justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="events-header">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <div class="logo-ring">
                <img src="https://i.ibb.co/TB5Fx4tb/logo-0.png" alt="Prayer Dome Logo">
            </div>
            <div class="brand-text">
                <h1>PRAYER DOME</h1>
                <p>EVENTS CALENDAR</p>
            </div>
        </div>
        <div class="header-actions">
            <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Home</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Add Event Button Bar - Below Header -->
        <div class="action-bar">
            <button class="add-event-btn" onclick="showAddEventModal()">
                <i class="fas fa-plus-circle"></i> Create New Event
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="upcomingCount">0</div><div class="stat-label">Upcoming Events</div></div>
            <div class="stat-card"><div class="stat-number" id="thisMonthCount">0</div><div class="stat-label">This Month</div></div>
            <div class="stat-card"><div class="stat-number" id="totalAttendees">0</div><div class="stat-label">Total Attendees</div></div>
            <div class="stat-card"><div class="stat-number" id="eventCategories">6</div><div class="stat-label">Categories</div></div>
        </div>

        <!-- Calendar and Events -->
        <div class="calendar-events-layout">
            <!-- Calendar -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="current-month" id="currentMonth"></div>
                    <button class="btn-outline" onclick="goToToday()" style="padding: 6px 12px;">Today</button>
                </div>
                <div class="weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <!-- Events List -->
            <div class="events-list-container">
                <div class="events-list-header">
                    <h3><i class="fas fa-calendar-day"></i> <span id="selectedDateTitle">Today's Events</span></h3>
                </div>
                <div class="events-list" id="eventsList"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- My RSVPs Section -->
        <div class="my-events-section">
            <div class="section-header">
                <h3><i class="fas fa-calendar-check"></i> My Events</h3>
                <button class="btn btn-outline btn-small" onclick="loadMyEvents()">Refresh</button>
            </div>
            <div id="myEventsList" class="events-list"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventModal" class="event-modal" style="display: none;">
        <div class="event-modal-content">
            <div class="event-modal-header">
                <h2 id="modalTitle">Event Title</h2>
                <button class="event-modal-close" onclick="closeEventModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalContent"></div>
            <div class="rsvp-buttons" id="rsvpButtons"></div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="event-modal" style="display: none;">
        <div class="event-modal-content">
            <div class="event-modal-header">
                <h2><i class="fas fa-plus-circle"></i> Add New Event</h2>
                <button class="event-modal-close" onclick="closeAddEventModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="eventForm" onsubmit="event.preventDefault(); addEvent()">
                <div class="form-group"><label>Event Title *</label><input type="text" id="eventTitle" required placeholder="e.g., Sunday Service"></div>
                <div class="form-group"><label>Date & Time *</label><input type="datetime-local" id="eventDateTime" required></div>
                <div class="form-group"><label>Duration</label><select id="eventDuration"><option value="60">1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option><option value="180">3 hours</option></select></div>
                <div class="form-group"><label>Location *</label><input type="text" id="eventLocation" required placeholder="e.g., Prayer Dome Zambia / Online"></div>
                <div class="form-group"><label>Category *</label><select id="eventCategory"><option value="Service">Sunday Service</option><option value="Prayer">Prayer Meeting</option><option value="Bible Study">Bible Study</option><option value="Worship">Worship Night</option><option value="Outreach">Outreach</option><option value="Conference">Conference</option></select></div>
                <div class="form-group"><label>Speaker/Host</label><input type="text" id="eventSpeaker" placeholder="e.g., Pastor Seedwell Masuku"></div>
                <div class="form-group"><label>Description</label><textarea id="eventDescription" rows="3" placeholder="Event description..."></textarea></div>
                <div class="form-group"><label>Max Participants (0 = unlimited)</label><input type="number" id="eventMaxAttendees" value="0" min="0"></div>
                <div class="form-group"><label>Event Image</label><input type="file" id="eventImage" accept="image/*"></div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Create Event</button>
                    <button type="button" class="btn btn-outline" onclick="closeAddEventModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, setDoc, updateDoc, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo", authDomain: "prayer-dome.firebaseapp.com", projectId: "prayer-dome", storageBucket: "prayer-dome.firebasestorage.app", messagingSenderId: "198295153196", appId: "1:198295153196:web:1222b31948d7974ba3bf89" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let currentUser = null;
        let events = [];
        let currentDate = new Date();
        let selectedDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        const defaultEvents = [
            { title: "Sunday Service", date: new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + (7 - new Date().getDay()) % 7), time: "09:00", duration: 120, location: "Prayer Dome Zambia & Online", category: "Service", speaker: "Pastor Seedwell Masuku", description: "Join us for powerful worship and the Word of God.", maxAttendees: 0 },
            { title: "Wednesday Prayer Meeting", date: new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + (3 - new Date().getDay() + 7) % 7), time: "18:00", duration: 60, location: "Online via Zoom", category: "Prayer", speaker: "Prayer Team", description: "Midweek prayer and intercession.", maxAttendees: 0 },
            { title: "Friday Healing Service", date: new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + (5 - new Date().getDay() + 7) % 7), time: "17:00", duration: 90, location: "Prayer Dome Eswatini", category: "Service", speaker: "Pastor Philmon Gumbi", description: "Special service focused on healing and deliverance.", maxAttendees: 0 }
        ];

        async function initializeDefaultEvents() {
            try {
                const snapshot = await getDocs(collection(db, "events"));
                if (snapshot.empty) {
                    for (const event of defaultEvents) {
                        const eventDate = new Date(event.date);
                        eventDate.setHours(parseInt(event.time.split(':')[0]), parseInt(event.time.split(':')[1]));
                        await addDoc(collection(db, "events"), { ...event, date: Timestamp.fromDate(eventDate), createdAt: Timestamp.now(), attendees: [], attendeeCount: 0 });
                    }
                }
            } catch (error) { console.error("Error adding default events:", error); }
        }

        async function loadEvents() {
            try {
                const snapshot = await getDocs(collection(db, "events"));
                events = [];
                snapshot.forEach(doc => { const data = doc.data(); events.push({ id: doc.id, ...data, dateObj: data.date?.toDate() || new Date(data.date) }); });
                renderCalendar();
                updateStats();
                renderEventsForDate(selectedDate);
            } catch (error) { console.error("Error loading events:", error); }
        }

        function updateStats() {
            const now = new Date();
            const upcoming = events.filter(e => e.dateObj > now);
            const thisMonth = events.filter(e => e.dateObj.getMonth() === now.getMonth() && e.dateObj.getFullYear() === now.getFullYear());
            const totalAttendees = events.reduce((sum, e) => sum + (e.attendeeCount || 0), 0);
            document.getElementById('upcomingCount').textContent = upcoming.length;
            document.getElementById('thisMonthCount').textContent = thisMonth.length;
            document.getElementById('totalAttendees').textContent = totalAttendees;
        }

        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - startDate.getDay());
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            const today = new Date(); today.setHours(0, 0, 0, 0);
            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                const isCurrentMonth = date.getMonth() === currentMonth;
                const isToday = date.toDateString() === today.toDateString();
                const isSelected = date.toDateString() === selectedDate.toDateString();
                const hasEvent = events.some(e => e.dateObj.toDateString() === date.toDateString());
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${!isCurrentMonth ? 'opacity-50' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${hasEvent ? 'has-event' : ''}`;
                dayDiv.innerHTML = `<span>${date.getDate()}</span>${hasEvent ? '<span class="event-dot"></span>' : ''}`;
                dayDiv.onclick = () => selectDate(date);
                calendarDays.appendChild(dayDiv);
            }
            document.getElementById('currentMonth').textContent = moment().month(currentMonth).format('MMMM YYYY');
        }

        function selectDate(date) { selectedDate = date; renderCalendar(); renderEventsForDate(date); }

        function renderEventsForDate(date) {
            const eventsList = document.getElementById('eventsList');
            const dayEvents = events.filter(e => e.dateObj.toDateString() === date.toDateString());
            document.getElementById('selectedDateTitle').textContent = moment(date).format('MMMM D, YYYY');
            if (dayEvents.length === 0) {
                eventsList.innerHTML = `<div style="text-align: center; padding: 40px;"><i class="fas fa-calendar-day" style="font-size: 48px; opacity: 0.3;"></i><p>No events scheduled</p><button class="btn btn-primary btn-small" style="margin-top: 15px;" onclick="showAddEventModal()">Add Event</button></div>`;
                return;
            }
            eventsList.innerHTML = dayEvents.map(event => `<div class="event-item" onclick="showEventDetails('${event.id}')"><div class="event-time"><i class="far fa-clock"></i> ${moment(event.dateObj).format('h:mm A')} (${event.duration || 60} min)</div><div class="event-title">${escapeHtml(event.title)}</div><div class="event-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}</div><span class="event-category" style="background: ${getCategoryColor(event.category)}20; color: ${getCategoryColor(event.category)};">${event.category}</span></div>`).join('');
        }

        function getCategoryColor(category) {
            const colors = { 'Service': '#22c55e', 'Prayer': '#3b82f6', 'Bible Study': '#8b5cf6', 'Worship': '#d4af37', 'Outreach': '#ef4444', 'Conference': '#f97316' };
            return colors[category] || '#22c55e';
        }

        window.showEventDetails = async function(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            const isAttending = currentUser && event.attendees?.includes(currentUser.uid);
            const isFull = event.maxAttendees > 0 && (event.attendeeCount || 0) >= event.maxAttendees;
            const modal = document.getElementById('eventModal');
            document.getElementById('modalTitle').textContent = event.title;
            document.getElementById('modalContent').innerHTML = `
                <div class="event-detail"><div class="event-detail-label"><i class="far fa-calendar-alt"></i> Date & Time</div><p>${moment(event.dateObj).format('dddd, MMMM D, YYYY')} at ${moment(event.dateObj).format('h:mm A')}</p><p>Duration: ${event.duration || 60} minutes</p></div>
                <div class="event-detail"><div class="event-detail-label"><i class="fas fa-map-marker-alt"></i> Location</div><p>${escapeHtml(event.location)}</p></div>
                <div class="event-detail"><div class="event-detail-label"><i class="fas fa-user"></i> Speaker/Host</div><p>${escapeHtml(event.speaker || 'Prayer Dome Team')}</p></div>
                <div class="event-detail"><div class="event-detail-label"><i class="fas fa-info-circle"></i> Description</div><p>${escapeHtml(event.description || 'No description provided.')}</p></div>
                <div class="event-detail"><div class="event-detail-label"><i class="fas fa-users"></i> Attendees</div><p>${event.attendeeCount || 0} attending${event.maxAttendees > 0 ? ` / ${event.maxAttendees} maximum` : ''}</p></div>`;
            const rsvpButtons = document.getElementById('rsvpButtons');
            if (currentUser) {
                if (isAttending) rsvpButtons.innerHTML = `<button class="btn btn-danger" style="flex:1;" onclick="cancelRSVP('${event.id}')"><i class="fas fa-times"></i> Cancel RSVP</button><button class="btn btn-outline" style="flex:1;" onclick="addToCalendar('${event.id}')"><i class="fas fa-calendar-plus"></i> Add to Calendar</button>`;
                else if (isFull) rsvpButtons.innerHTML = `<button class="btn btn-outline" style="flex:1;" disabled><i class="fas fa-ban"></i> Event Full</button><button class="btn btn-outline" style="flex:1;" onclick="addToCalendar('${event.id}')"><i class="fas fa-calendar-plus"></i> Add to Calendar</button>`;
                else rsvpButtons.innerHTML = `<button class="btn btn-primary" style="flex:1;" onclick="rsvpToEvent('${event.id}')"><i class="fas fa-check"></i> RSVP Now</button><button class="btn btn-outline" style="flex:1;" onclick="addToCalendar('${event.id}')"><i class="fas fa-calendar-plus"></i> Add to Calendar</button>`;
            } else rsvpButtons.innerHTML = `<button class="btn btn-primary" style="flex:1;" onclick="showLoginPrompt()"><i class="fas fa-sign-in-alt"></i> Login to RSVP</button><button class="btn btn-outline" style="flex:1;" onclick="addToCalendar('${event.id}')"><i class="fas fa-calendar-plus"></i> Add to Calendar</button>`;
            modal.style.display = 'flex';
        };
        
        window.rsvpToEvent = async function(eventId) {
            if (!currentUser) { showToast('Please login to RSVP', 'error'); showLoginPrompt(); return; }
            const memberDoc = await getDoc(doc(db, "memberships", currentUser.uid));
            if (!memberDoc.exists()) { showToast('Only registered members can RSVP.', 'error'); window.location.href = 'membership.html'; return; }
            try {
                const eventRef = doc(db, "events", eventId);
                const eventDoc = await getDoc(eventRef);
                const event = eventDoc.data();
                const attendees = event.attendees || [];
                if (attendees.includes(currentUser.uid)) { showToast('You already RSVPed', 'info'); return; }
                if (event.maxAttendees > 0 && (event.attendeeCount || 0) >= event.maxAttendees) { showToast('Event is full!', 'error'); return; }
                await updateDoc(eventRef, { attendees: [...attendees, currentUser.uid], attendeeCount: (event.attendeeCount || 0) + 1, rsvpTimestamps: { ...(event.rsvpTimestamps || {}), [currentUser.uid]: Timestamp.now() } });
                await setDoc(doc(db, "userEvents", `${currentUser.uid}_${eventId}`), { userId: currentUser.uid, eventId: eventId, eventTitle: event.title, eventDate: event.date, rsvpedAt: Timestamp.now(), attended: false });
                showToast(`✅ Successfully RSVPed for ${event.title}!`, 'success');
                confetti({ particleCount: 80, spread: 60 });
                loadEvents();
                closeEventModal();
            } catch (error) { showToast('Error: ' + error.message, 'error'); }
        };

        window.cancelRSVP = async function(eventId) {
            if (!confirm('Cancel your RSVP?')) return;
            try {
                const event = events.find(e => e.id === eventId);
                await updateDoc(doc(db, "events", eventId), { attendees: (event.attendees || []).filter(id => id !== currentUser.uid), attendeeCount: Math.max(0, (event.attendeeCount || 0) - 1) });
                showToast('RSVP cancelled', 'success');
                loadEvents();
                closeEventModal();
            } catch (error) { showToast(error.message, 'error'); }
        };

        window.addEvent = async function() {
            if (!currentUser) { showToast('Please login', 'error'); return; }
            const memberDoc = await getDoc(doc(db, "memberships", currentUser.uid));
            if (!memberDoc.exists() || memberDoc.data().role !== 'admin') { showToast('Only admins can add events', 'error'); return; }
            const title = document.getElementById('eventTitle').value;
            const dateTime = document.getElementById('eventDateTime').value;
            const duration = parseInt(document.getElementById('eventDuration').value);
            const location = document.getElementById('eventLocation').value;
            const category = document.getElementById('eventCategory').value;
            const speaker = document.getElementById('eventSpeaker').value;
            const description = document.getElementById('eventDescription').value;
            const maxAttendees = parseInt(document.getElementById('eventMaxAttendees').value);
            const eventImage = document.getElementById('eventImage').files[0];
            if (!title || !dateTime || !location) { showToast('Please fill required fields', 'error'); return; }
            try {
                let imageUrl = null;
                if (eventImage) {
                    const storageRef = ref(storage, `events/${Date.now()}_${eventImage.name}`);
                    await uploadBytes(storageRef, eventImage);
                    imageUrl = await getDownloadURL(storageRef);
                }
                await addDoc(collection(db, "events"), { title, date: Timestamp.fromDate(new Date(dateTime)), duration, location, category, speaker: speaker || 'Prayer Dome Team', description: description || '', maxAttendees: maxAttendees || 0, imageUrl, attendees: [], attendeeCount: 0, createdBy: currentUser.uid, createdByEmail: currentUser.email, createdAt: Timestamp.now(), status: 'published' });
                showToast('✅ Event created!', 'success');
                closeAddEventModal();
                loadEvents();
            } catch (error) { showToast('Error: ' + error.message, 'error'); }
        };

        window.addToCalendar = function(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            const startDate = event.dateObj;
            const endDate = new Date(startDate.getTime() + (event.duration || 60) * 60000);
            window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&dates=${startDate.toISOString().replace(/[-:]/g, '').split('.')[0]}/${endDate.toISOString().replace(/[-:]/g, '').split('.')[0]}&details=${encodeURIComponent(event.description || '')}&location=${encodeURIComponent(event.location)}`, '_blank');
            showToast('Opening Google Calendar...', 'success');
        };

        function prevMonth() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); }
        function nextMonth() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); }
        function goToToday() { const today = new Date(); currentMonth = today.getMonth(); currentYear = today.getFullYear(); selectedDate = today; renderCalendar(); renderEventsForDate(today); }
        function showAddEventModal() { document.getElementById('addEventModal').style.display = 'flex'; document.getElementById('eventDateTime').value = moment().add(1, 'days').format('YYYY-MM-DDTHH:mm'); }
        function closeAddEventModal() { document.getElementById('addEventModal').style.display = 'none'; document.getElementById('eventForm').reset(); }
        function closeEventModal() { document.getElementById('eventModal').style.display = 'none'; }
        function showLoginPrompt() { showToast('Please login to RSVP', 'error'); }
        function showToast(message, type = 'success') { const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = `toast ${type === 'error' ? 'error' : ''}`; toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`; container.appendChild(toast); setTimeout(() => toast.remove(), 3500); }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        window.loadMyEvents = async function() {
            if (!currentUser) { document.getElementById('myEventsList').innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-lock" style="font-size:48px; opacity:0.3;"></i><p>Login to see your events</p></div>`; return; }
            try {
                const snapshot = await getDocs(query(collection(db, "userEvents"), where("userId", "==", currentUser.uid), orderBy("rsvpedAt", "desc")));
                if (snapshot.empty) { document.getElementById('myEventsList').innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-calendar-alt" style="font-size:48px; opacity:0.3;"></i><p>No RSVPs yet</p><button class="btn btn-primary" onclick="document.querySelector('.calendar-container').scrollIntoView()">Browse Events</button></div>`; return; }
                const myEvents = [];
                for (const docSnap of snapshot.docs) {
                    const data = docSnap.data();
                    const eventDoc = await getDoc(doc(db, "events", data.eventId));
                    if (eventDoc.exists()) myEvents.push({ id: data.eventId, ...eventDoc.data(), rsvpedAt: data.rsvpedAt });
                }
                document.getElementById('myEventsList').innerHTML = myEvents.map(event => `<div class="event-item" onclick="showEventDetails('${event.id}')"><div class="event-time"><i class="far fa-clock"></i> ${moment(event.date.toDate()).format('dddd, MMMM D, YYYY • h:mm A')}</div><div class="event-title">${escapeHtml(event.title)}</div><div class="event-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}</div><div style="display:flex; justify-content:space-between; margin-top:8px;"><span class="event-category">${event.category}</span><span style="font-size:11px; color:var(--accent-green);"><i class="fas fa-check-circle"></i> RSVPed ${moment(event.rsvpedAt?.toDate()).fromNow()}</span></div></div>`).join('');
            } catch (error) { console.error('Error loading my events:', error); document.getElementById('myEventsList').innerHTML = '<div style="text-align:center; padding:40px;">Error loading events</div>'; }
        };

        onAuthStateChanged(auth, (user) => { currentUser = user; });
        window.showEventDetails = showEventDetails; window.rsvpToEvent = rsvpToEvent; window.cancelRSVP = cancelRSVP; window.addToCalendar = addToCalendar;
        window.prevMonth = prevMonth; window.nextMonth = nextMonth; window.goToToday = goToToday; window.showAddEventModal = showAddEventModal;
        window.closeAddEventModal = closeAddEventModal; window.closeEventModal = closeEventModal; window.addEvent = addEvent; window.toggleDarkMode = toggleDarkMode;
        initializeDefaultEvents(); loadEvents();
    </script>
</body>
</html>
