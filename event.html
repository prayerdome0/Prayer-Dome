<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | Events Calendar - Services & Gatherings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-green: #22c55e;
            --accent-gold: #d4af37;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            min-height: 100vh;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
        }

        /* Header */
        .events-header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-bottom: 1px solid var(--border-color);
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .theme-toggle, .back-btn, .add-event-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .add-event-btn {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            border: none;
        }

        .add-event-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34,197,94,0.4);
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-green);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Calendar and Events Layout */
        .calendar-events-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Calendar Styles */
        .calendar-container {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .calendar-nav {
            display: flex;
            gap: 12px;
        }

        .calendar-nav button {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .current-month {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 10px 0;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: var(--bg-primary);
            font-weight: 500;
        }

        .calendar-day:hover {
            background: rgba(34, 197, 94, 0.1);
            transform: scale(1.02);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
        }

        .calendar-day.has-event {
            border: 2px solid var(--accent-gold);
        }

        .calendar-day.selected {
            background: var(--accent-green);
            color: white;
            transform: scale(1.05);
        }

        .event-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Events List */
        .events-list-container {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .events-list-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .events-list-header h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .events-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .event-item {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
            border-left: 4px solid var(--accent-green);
        }

        .event-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        .event-time {
            font-size: 0.75rem;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .event-title {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .event-location {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .event-category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            margin-top: 8px;
        }

        /* Event Modal */
        .event-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .event-modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .event-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .event-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .event-detail {
            margin-bottom: 20px;
        }

        .event-detail-label {
            font-weight: 600;
            color: var(--accent-green);
            margin-bottom: 5px;
        }

        .rsvp-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            color: white;
        }

        /* Add Event Modal */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
        }
        .toast {
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 40px;
            margin-bottom: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-left: 4px solid var(--accent-green);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .calendar-events-layout { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .main-container { padding: 20px; }
        }
    </style>
</head>
<body>

        <div class="header-content">
            <div class="logo-area">

<div class="my-events-section" style="margin-top: 40px;">

            <form id="eventForm" onsubmit="event.preventDefault(); addEvent()">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
    getFirestore, collection, addDoc, getDocs, getDoc, doc, setDoc,
    updateDoc, query, where, orderBy, Timestamp 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo",
            authDomain: "prayer-dome.firebaseapp.com",
            projectId: "prayer-dome",
            storageBucket: "prayer-dome.firebasestorage.app",
            messagingSenderId: "198295153196",
            appId: "1:198295153196:web:1222b31948d7974ba3bf89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let events = [];
        let currentDate = new Date();
        let selectedDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        // Sample default events
        const defaultEvents = [
            {
                title: "Sunday Service",
                date: new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + (7 - new Date().getDay()) % 7),
                time: "09:00",
                duration: 120,
                location: "Prayer Dome Zambia & Online",
                category: "Service",
                speaker: "Pastor Seedwell Masuku",
                description: "Join us for powerful worship and the Word of God.",
                maxAttendees: 0
            },
            {
                title: "Wednesday Prayer Meeting",
                date: new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + (3 - new Date().getDay() + 7) % 7),
                time: "18:00",
                duration: 60,
                location: "Online via Zoom",
                category: "Prayer",
                speaker: "Prayer Team",
                description: "Midweek prayer and intercession.",
                maxAttendees: 0
            },
            {
                title: "Friday Healing Service",
                date: new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() + (5 - new Date().getDay() + 7) % 7),
                time: "17:00",
                duration: 90,
                location: "Prayer Dome Eswatini",
                category: "Service",
                speaker: "Pastor Philmon Gumbi",
                description: "Special service focused on healing and deliverance.",
                maxAttendees: 0
            }
        ];

        async function initializeDefaultEvents() {
            try {
                const snapshot = await getDocs(collection(db, "events"));
                if (snapshot.empty) {
                    for (const event of defaultEvents) {
                        const eventDate = new Date(event.date);
                        eventDate.setHours(parseInt(event.time.split(':')[0]), parseInt(event.time.split(':')[1]));
                        await addDoc(collection(db, "events"), {
                            ...event,
                            date: Timestamp.fromDate(eventDate),
                            createdAt: Timestamp.now(),
                            attendees: [],
                            attendeeCount: 0
                        });
                    }
                    console.log("Default events added");
                }
            } catch (error) {
                console.error("Error adding default events:", error);
            }
        }

        async function loadEvents() {
            try {
                const snapshot = await getDocs(collection(db, "events"));
                events = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    events.push({
                        id: doc.id,
                        ...data,
                        dateObj: data.date?.toDate() || new Date(data.date)
                    });
                });
                renderCalendar();
                updateStats();
                renderEventsForDate(selectedDate);
            } catch (error) {
                console.error("Error loading events:", error);
            }
        }

        function updateStats() {
            const now = new Date();
            const upcoming = events.filter(e => e.dateObj > now);
            const thisMonth = events.filter(e => e.dateObj.getMonth() === now.getMonth() && e.dateObj.getFullYear() === now.getFullYear());
            const totalAttendees = events.reduce((sum, e) => sum + (e.attendeeCount || 0), 0);
            
            document.getElementById('upcomingCount').textContent = upcoming.length;
            document.getElementById('thisMonthCount').textContent = thisMonth.length;
            document.getElementById('totalAttendees').textContent = totalAttendees;
        }

        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - startDate.getDay());
            
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                const isCurrentMonth = date.getMonth() === currentMonth;
                const isToday = date.toDateString() === today.toDateString();
                const isSelected = date.toDateString() === selectedDate.toDateString();
                const hasEvent = events.some(e => e.dateObj.toDateString() === date.toDateString());
                
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${!isCurrentMonth ? 'opacity-50' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${hasEvent ? 'has-event' : ''}`;
                dayDiv.innerHTML = `<span>${date.getDate()}</span>${hasEvent ? '<span class="event-dot"></span>' : ''}`;
                dayDiv.onclick = () => selectDate(date);
                calendarDays.appendChild(dayDiv);
            }
            
            document.getElementById('currentMonth').textContent = moment().month(currentMonth).format('MMMM YYYY');
        }

        function selectDate(date) {
            selectedDate = date;
            renderCalendar();
            renderEventsForDate(date);
        }

        function renderEventsForDate(date) {
            const eventsList = document.getElementById('eventsList');
            const dayEvents = events.filter(e => e.dateObj.toDateString() === date.toDateString());
            
            document.getElementById('selectedDateTitle').textContent = moment(date).format('MMMM D, YYYY');
            
            if (dayEvents.length === 0) {
                eventsList.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-calendar-day" style="font-size: 48px; opacity: 0.3; margin-bottom: 15px;"></i>
                        <p>No events scheduled for this day</p>
                        <button class="btn btn-primary btn-small" style="margin-top: 15px;" onclick="showAddEventModal()">Add Event</button>
                    </div>
                `;
                return;
            }
            
            eventsList.innerHTML = dayEvents.map(event => `
                <div class="event-item" onclick="showEventDetails('${event.id}')">
                    <div class="event-time">
                        <i class="far fa-clock"></i> ${moment(event.dateObj).format('h:mm A')} (${event.duration || 60} min)
                    </div>
                    <div class="event-title">${escapeHtml(event.title)}</div>
                    <div class="event-location">
                        <i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}
                    </div>
                    <span class="event-category" style="background: ${getCategoryColor(event.category)}20; color: ${getCategoryColor(event.category)};">
                        ${event.category}
                    </span>
                </div>
            `).join('');
        }

        function getCategoryColor(category) {
            const colors = {
                'Service': '#22c55e',
                'Prayer': '#3b82f6',
                'Bible Study': '#8b5cf6',
                'Worship': '#d4af37',
                'Outreach': '#ef4444',
                'Conference': '#f97316'
            };
            return colors[category] || '#22c55e';
        }

        async function showEventDetails(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            const isAttending = currentUser && event.attendees?.includes(currentUser.uid);
            const isFull = event.maxAttendees > 0 && (event.attendeeCount || 0) >= event.maxAttendees;
            
            const modal = document.getElementById('eventModal');
            document.getElementById('modalTitle').textContent = event.title;
            document.getElementById('modalContent').innerHTML = `
                <div class="event-detail">
                    <div class="event-detail-label"><i class="far fa-calendar-alt"></i> Date & Time</div>
                    <p>${moment(event.dateObj).format('dddd, MMMM D, YYYY')} at ${moment(event.dateObj).format('h:mm A')}</p>
                    <p class="text-secondary">Duration: ${event.duration || 60} minutes</p>
                </div>
                <div class="event-detail">
                    <div class="event-detail-label"><i class="fas fa-map-marker-alt"></i> Location</div>
                    <p>${escapeHtml(event.location)}</p>
                </div>
                <div class="event-detail">
                    <div class="event-detail-label"><i class="fas fa-user"></i> Speaker/Host</div>
                    <p>${escapeHtml(event.speaker || 'Prayer Dome Team')}</p>
                </div>
                <div class="event-detail">
                    <div class="event-detail-label"><i class="fas fa-info-circle"></i> Description</div>
                    <p>${escapeHtml(event.description || 'No description provided.')}</p>
                </div>
                <div class="event-detail">
                    <div class="event-detail-label"><i class="fas fa-users"></i> Attendees</div>
                    <p>${event.attendeeCount || 0} attending${event.maxAttendees > 0 ? ` / ${event.maxAttendees} maximum` : ''}</p>
                </div>
            `;
            
            const rsvpButtons = document.getElementById('rsvpButtons');
            if (currentUser) {
                if (isAttending) {
                    rsvpButtons.innerHTML = `
                        <button class="btn btn-danger" style="flex: 1;" onclick="cancelRSVP('${event.id}')">
                            <i class="fas fa-times"></i> Cancel RSVP
                        </button>
                        <button class="btn btn-outline" style="flex: 1;" onclick="addToCalendar('${event.id}')">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </button>
                    `;
                } else if (isFull) {
                    rsvpButtons.innerHTML = `
                        <button class="btn btn-outline" style="flex: 1;" disabled>
                            <i class="fas fa-ban"></i> Event Full
                        </button>
                        <button class="btn btn-outline" style="flex: 1;" onclick="addToCalendar('${event.id}')">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </button>
                    `;
                } else {
                    rsvpButtons.innerHTML = `
                        <button class="btn btn-primary" style="flex: 1;" onclick="rsvpToEvent('${event.id}')">
                            <i class="fas fa-check"></i> RSVP Now
                        </button>
                        <button class="btn btn-outline" style="flex: 1;" onclick="addToCalendar('${event.id}')">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </button>
                    `;
                }
            } else {
                rsvpButtons.innerHTML = `
                    <button class="btn btn-primary" style="flex: 1;" onclick="showLoginPrompt()">
                        <i class="fas fa-sign-in-alt"></i> Login to RSVP
                    </button>
                    <button class="btn btn-outline" style="flex: 1;" onclick="addToCalendar('${event.id}')">
                        <i class="fas fa-calendar-plus"></i> Add to Calendar
                    </button>
                `;
            }
            
            modal.style.display = 'flex';
        }

        async function rsvpToEvent(eventId) {
    if (!currentUser) {
        showToast('Please login to RSVP', 'error');
        showLoginModal();
        return;
    }
    
    // Check if user is a member (has membership)
    const memberDoc = await getDoc(doc(db, "memberships", currentUser.uid));
    if (!memberDoc.exists()) {
        showToast('Only registered members can RSVP. Please complete membership first.', 'error');
        window.location.href = 'membership.html';
        return;
    }
    
    try {
        const eventRef = doc(db, "events", eventId);
        const eventDoc = await getDoc(eventRef);
        const event = eventDoc.data();
        const attendees = event.attendees || [];
        
        if (attendees.includes(currentUser.uid)) {
            showToast('You already RSVPed for this event', 'info');
            return;
        }
        
        if (event.maxAttendees > 0 && (event.attendeeCount || 0) >= event.maxAttendees) {
            showToast('This event is full!', 'error');
            return;
        }
        
        await updateDoc(eventRef, {
            attendees: [...attendees, currentUser.uid],
            attendeeCount: (event.attendeeCount || 0) + 1,
            rsvpTimestamps: {
                ...(event.rsvpTimestamps || {}),
                [currentUser.uid]: Timestamp.now()
            }
        });
        
        // Add to user's events collection
        await setDoc(doc(db, "userEvents", `${currentUser.uid}_${eventId}`), {
            userId: currentUser.uid,
            eventId: eventId,
            eventTitle: event.title,
            eventDate: event.date,
            rsvpedAt: Timestamp.now(),
            attended: false
        });
        
        showToast(`✅ Successfully RSVPed for ${event.title}!`, 'success');
        confetti({ particleCount: 80, spread: 60 });
        loadEvents();
        closeEventModal();
        
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

        async function cancelRSVP(eventId) {
            if (!confirm('Cancel your RSVP for this event?')) return;
            
            try {
                const eventRef = doc(db, "events", eventId);
                const event = events.find(e => e.id === eventId);
                const attendees = event.attendees || [];
                
                await updateDoc(eventRef, {
                    attendees: attendees.filter(id => id !== currentUser.uid),
                    attendeeCount: Math.max(0, (event.attendeeCount || 0) - 1)
                });
                
                showToast('RSVP cancelled', 'success');
                loadEvents();
                closeEventModal();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function addEvent() {
    if (!currentUser) {
        showToast('Please login to add events', 'error');
        showLoginModal();
        return;
    }
    
    // Check if user is admin or has permission
    const memberDoc = await getDoc(doc(db, "memberships", currentUser.uid));
    const isAdmin = memberDoc.exists() && memberDoc.data().role === 'admin';
    
    if (!isAdmin) {
        showToast('Only ministry leaders can add events. Contact admin.', 'error');
        return;
    }
    
    const title = document.getElementById('eventTitle').value;
    const dateTime = document.getElementById('eventDateTime').value;
    const duration = parseInt(document.getElementById('eventDuration').value);
    const location = document.getElementById('eventLocation').value;
    const category = document.getElementById('eventCategory').value;
    const speaker = document.getElementById('eventSpeaker').value;
    const description = document.getElementById('eventDescription').value;
    const maxAttendees = parseInt(document.getElementById('eventMaxAttendees').value);
    const eventImage = document.getElementById('eventImage').files[0];
    
    if (!title || !dateTime || !location) {
        showToast('Please fill required fields', 'error');
        return;
    }
    
    showToast('Creating event...', 'info');
    
    try {
        // Upload image if provided
        let imageUrl = null;
        if (eventImage) {
            const storageRef = ref(storage, `events/${Date.now()}_${eventImage.name}`);
            await uploadBytes(storageRef, eventImage);
            imageUrl = await getDownloadURL(storageRef);
        }
        
        await addDoc(collection(db, "events"), {
            title,
            date: Timestamp.fromDate(new Date(dateTime)),
            duration,
            location,
            category,
            speaker: speaker || 'Prayer Dome Team',
            description: description || '',
            maxAttendees: maxAttendees || 0,
            imageUrl: imageUrl,
            attendees: [],
            attendeeCount: 0,
            createdBy: currentUser.uid,
            createdByEmail: currentUser.email,
            createdAt: Timestamp.now(),
            status: 'published'
        });
        
        showToast('✅ Event created successfully!', 'success');
        closeAddEventModal();
        loadEvents();
        
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

        function addToCalendar(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            const startDate = event.dateObj;
            const endDate = new Date(startDate.getTime() + (event.duration || 60) * 60000);
            const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&dates=${startDate.toISOString().replace(/[-:]/g, '').split('.')[0]}/${endDate.toISOString().replace(/[-:]/g, '').split('.')[0]}&details=${encodeURIComponent(event.description || '')}&location=${encodeURIComponent(event.location)}`;
            
            window.open(googleUrl, '_blank');
            showToast('Opening Google Calendar...', 'success');
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function goToToday() {
            const today = new Date();
            currentMonth = today.getMonth();
            currentYear = today.getFullYear();
            selectedDate = today;
            renderCalendar();
            renderEventsForDate(today);
        }

        function showAddEventModal() {
            document.getElementById('addEventModal').style.display = 'flex';
            document.getElementById('eventDateTime').value = moment().add(1, 'days').format('YYYY-MM-DDTHH:mm');
        }

        function closeAddEventModal() {
            document.getElementById('addEventModal').style.display = 'none';
            document.getElementById('eventForm').reset();
        }

        function closeEventModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        function showLoginPrompt() {
            showToast('Please login to RSVP', 'error');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            btn.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i> Light Mode' : '<i class="fas fa-moon"></i> Dark Mode';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        window.showEventDetails = showEventDetails;
        window.rsvpToEvent = rsvpToEvent;
        window.cancelRSVP = cancelRSVP;
        window.addToCalendar = addToCalendar;
        window.prevMonth = prevMonth;
        window.nextMonth = nextMonth;
        window.goToToday = goToToday;
        window.showAddEventModal = showAddEventModal;
        window.closeAddEventModal = closeAddEventModal;
        window.closeEventModal = closeEventModal;
        window.addEvent = addEvent;
        window.toggleDarkMode = toggleDarkMode;
        window.showLoginPrompt = showLoginPrompt;

        initializeDefaultEvents();
        loadEvents();
        
        async function loadMyEvents() {
    if (!currentUser) {
        document.getElementById('myEventsList').innerHTML = `
            <div style="text-align: center; padding: 40px;">
                <i class="fas fa-lock" style="font-size: 48px; opacity: 0.3;"></i>
                <p>Login to see your events</p>
            </div>
        `;
        return;
    }
    
    try {
        const userEventsQuery = query(
            collection(db, "userEvents"),
            where("userId", "==", currentUser.uid),
            orderBy("rsvpedAt", "desc")
        );
        const snapshot = await getDocs(userEventsQuery);
        
        if (snapshot.empty) {
            document.getElementById('myEventsList').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-calendar-alt" style="font-size: 48px; opacity: 0.3;"></i>
                    <p>You haven't RSVPed for any events yet</p>
                    <button class="btn btn-primary" onclick="document.querySelector('.calendar-container').scrollIntoView()">Browse Events</button>
                </div>
            `;
            return;
        }
        
        const myEvents = [];
        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            const eventDoc = await getDoc(doc(db, "events", data.eventId));
            if (eventDoc.exists()) {
                myEvents.push({ id: data.eventId, ...eventDoc.data(), rsvpedAt: data.rsvpedAt });
            }
        }
        
        document.getElementById('myEventsList').innerHTML = myEvents.map(event => `
            <div class="event-item" onclick="showEventDetails('${event.id}')">
                <div class="event-time">
                    <i class="far fa-clock"></i> ${moment(event.date.toDate()).format('dddd, MMMM D, YYYY • h:mm A')}
                </div>
                <div class="event-title">${escapeHtml(event.title)}</div>
                <div class="event-location">
                    <i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                    <span class="event-category">${event.category}</span>
                    <span style="font-size: 11px; color: var(--accent-green);">
                        <i class="fas fa-check-circle"></i> RSVPed ${moment(event.rsvpedAt?.toDate()).fromNow()}
                    </span>
                </div>
            </div>
        `).join('');
        
    } catch (error) {
        console.error('Error loading my events:', error);
        document.getElementById('myEventsList').innerHTML = '<div style="text-align: center; padding: 40px;">Error loading events</div>';
    }
}
    </script>
</body>
